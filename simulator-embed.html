<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>The Safety Net Simulator — mBOLDen Change</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --brand-black: #000000;
      --brand-white: #FFFFFF;
      --brand-yellow: #FAD826;
      --brand-teal: #0091AD;
      --brand-fuchsia: #B22F93;
      --brand-gray: #E2E2E2;
      --brand-cream: #F8EFE0;
      --card-border: #d4cabb;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --muted: #777777;
    }
    html { font-size: 18px; scroll-behavior: smooth; }
    body { font-family: 'Roboto', Arial, sans-serif; line-height: 1.5; background: var(--brand-cream); color: var(--text); }
    h1, h2, h3, .brand-heading { font-family: 'Archivo Narrow', 'Arial Narrow', Arial, sans-serif; font-weight: 700; }
    .pre-header { font-family: 'Archivo Narrow', 'Arial Narrow', Arial, sans-serif; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .brand-quote { font-family: 'Archivo Narrow', 'Arial Narrow', Arial, sans-serif; font-weight: 700; }
    .angled-top { clip-path: polygon(0 8%, 100% 0, 100% 100%, 0 100%); }
    .angled-bottom { clip-path: polygon(0 0, 100% 0, 100% 92%, 0 100%); }
    .severity-1 { background-color: #FEF9C3; border-color: #FACC15; }
    .severity-2 { background-color: #FFEDD5; border-color: #FB923C; }
    .severity-3 { background-color: #FEE2E2; border-color: #EF4444; }
    .sev-tooltip { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1F2937; color: white; padding: 6px 10px; border-radius: 8px; font-size: 11px; white-space: nowrap; z-index: 50; pointer-events: none; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .sev-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #1F2937; }
    .abbr-tooltip { cursor: help; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }

    /* ── V2: Full-bleed hero ── */
    .v2-hero {
      min-height: 100vh; background: var(--brand-black);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center; padding: 60px 40px; position: relative;
    }
    .v2-hero-logo { position: absolute; top: 28px; left: 40px; }
    .v2-hero-logo img { height: 72px; filter: invert(1) brightness(2); }
    .v2-hero-title {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: clamp(42px, 7vw, 80px);
      font-weight: 700; line-height: 0.94;
      letter-spacing: -0.02em; text-transform: uppercase;
      color: var(--brand-white); margin-bottom: 20px;
      opacity: 0; animation: v2FadeUp 1s ease 0.4s forwards;
    }
    .v2-hero-title em { font-style: italic; color: var(--brand-yellow); }
    .v2-hero-sub {
      font-size: clamp(14px, 2vw, 18px); color: #999;
      max-width: 560px; margin: 0 auto 32px;
      opacity: 0; animation: v2FadeUp 1s ease 0.7s forwards;
    }
    .v2-hero-cta {
      display: inline-block; padding: 14px 36px; border-radius: 8px;
      font-family: 'Archivo Narrow', sans-serif; font-weight: 700;
      font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase;
      background: var(--brand-teal); color: white; border: none; cursor: pointer;
      opacity: 0; animation: v2FadeUp 1s ease 1s forwards;
      transition: opacity 0.2s;
    }
    .v2-hero-cta:hover { opacity: 0.9; }
    .v2-hero-scroll {
      position: absolute; bottom: 36px; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; animation: v2FadeUp 1s ease 1.2s forwards;
    }
    .v2-hero-scroll span {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 10px; letter-spacing: 0.25em;
      text-transform: uppercase; color: #666; margin-bottom: 8px;
    }
    .v2-hero-scroll .arrow {
      width: 18px; height: 18px;
      border-right: 2px solid #666; border-bottom: 2px solid #666;
      transform: rotate(45deg); animation: v2Bounce 2s ease infinite;
    }
    @keyframes v2FadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes v2Bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); opacity: 1; }
      50% { transform: rotate(45deg) translateY(6px); opacity: 0.4; }
    }

    /* ── V2: Section bands ── */
    .v2-section { width: 100vw; position: relative; left: 50%; right: 50%; margin-left: -50vw; margin-right: -50vw; padding: 48px 24px; }
    .v2-section-cream { background: var(--brand-cream); }
    .v2-section-white { background: var(--card-bg); }
    .v2-section-inner { max-width: 768px; margin: 0 auto; }
    .v2-section-inner-wide { max-width: 1024px; margin: 0 auto; }

    /* ── V2: Sticky stability bar ── */
    .v2-sticky-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(0,0,0,0.94);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(250,216,38,0.15);
      display: flex; align-items: center; justify-content: space-between;
      height: 40px; padding: 0 20px;
      transform: translateY(-100%); transition: transform 0.4s ease;
    }
    .v2-sticky-bar.visible { transform: translateY(0); }
    .v2-sticky-bar-label {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--brand-yellow);
      white-space: nowrap; flex-shrink: 0;
    }
    .v2-sticky-bar-track {
      flex: 1; height: 6px; background: rgba(255,255,255,0.1);
      border-radius: 3px; margin: 0 16px; overflow: hidden;
    }
    .v2-sticky-bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 1s ease-out, background-color 0.6s ease;
    }
    .v2-sticky-bar-score {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 13px; font-weight: 700; white-space: nowrap;
      transition: color 0.6s ease;
    }

    /* ── V2: Reveal animations ── */
    .v2-reveal {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .v2-reveal.visible { opacity: 1; transform: translateY(0); }
    .v2-reveal-delay-1 { transition-delay: 0.15s; }
    .v2-reveal-delay-2 { transition-delay: 0.3s; }
    .v2-reveal-delay-3 { transition-delay: 0.45s; }

    /* ── V2: Round transition ── */
    .v2-round-enter { animation: v2RoundIn 0.5s ease forwards; }
    @keyframes v2RoundIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── V2: Tradeoff cards ── */
    .v2-tradeoff-card {
      width: 100%; text-align: left; padding: 16px 20px;
      border-radius: 10px; border: 2px solid var(--card-border);
      background: var(--card-bg); transition: all 0.2s ease;
      cursor: pointer; position: relative;
    }
    .v2-tradeoff-card:hover { border-color: #999; }
    .v2-tradeoff-card.selected { border-color: transparent; }
    .v2-tradeoff-card.sev-1.selected { border-left: 5px solid #FACC15; background: #FFFDF0; border-color: #FACC15; }
    .v2-tradeoff-card.sev-2.selected { border-left: 5px solid #FB923C; background: #FFF8F1; border-color: #FB923C; }
    .v2-tradeoff-card.sev-3.selected { border-left: 5px solid #EF4444; background: #FEF5F5; border-color: #EF4444; }
    .v2-tradeoff-detail {
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .v2-tradeoff-detail.open { max-height: 120px; opacity: 1; }

    /* ── V2: Receipt-style summary ── */
    .v2-receipt {
      background: #faf6ee;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.008) 2px, rgba(0,0,0,0.008) 3px),
        repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(0,0,0,0.005) 4px, rgba(0,0,0,0.005) 5px);
      border-radius: 0; position: relative; padding: 32px 28px;
      box-shadow: 2px 4px 20px rgba(0,0,0,0.10), inset 0 0 40px rgba(180,160,120,0.06);
    }
    .v2-receipt::before {
      content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 8px;
      background: linear-gradient(135deg, #faf6ee 33.33%, transparent 33.33%) 0 0 / 12px 8px,
                  linear-gradient(225deg, #faf6ee 33.33%, transparent 33.33%) 12px 0 / 12px 8px;
      background-repeat: repeat-x;
    }
    .v2-receipt::after {
      content: ''; position: absolute; bottom: -8px; left: 0; right: 0; height: 8px;
      background: linear-gradient(315deg, #faf6ee 33.33%, transparent 33.33%) 0 0 / 12px 8px,
                  linear-gradient(45deg, #faf6ee 33.33%, transparent 33.33%) 12px 0 / 12px 8px;
      background-repeat: repeat-x;
    }
    .v2-receipt-line { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #d4cabb; font-size: 14px; }
    .v2-receipt-line:last-child { border-bottom: none; }
    .v2-receipt-total { display: flex; justify-content: space-between; padding: 10px 0; border-top: 2px solid #000; font-weight: 700; font-size: 16px; margin-top: 8px; }

    /* ── V2: Card styling ── */
    .v2-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 20px; transition: border-color 0.2s;
    }
    .v2-card:hover { border-color: #999; }

    /* ── V2: Mobile ── */
    @media (max-width: 640px) {
      html { font-size: 16px; }
      .v2-hero { padding: 40px 20px; }
      .v2-hero-logo { top: 16px; left: 20px; }
      .v2-hero-logo img { height: 48px; }
      .v2-section { padding: 32px 16px; }
      .v2-sticky-bar { height: 36px; padding: 0 12px; }
      .v2-sticky-bar-label { font-size: 9px; }
      .v2-sticky-bar-score { font-size: 11px; }
      .v2-receipt { padding: 24px 16px; }
      .max-w-3xl { padding-left: 1rem; padding-right: 1rem; }
      .qol-chart-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .qol-chart-wrap svg { min-width: 480px; }
    }
    @media (max-width: 375px) {
      .v2-hero-title { font-size: 36px; }
      .v2-sticky-bar-track { margin: 0 8px; }
    }

    /* ── Print ── */
    @media print {
      .v2-sticky-bar { display: none !important; }
      .v2-reveal { opacity: 1 !important; transform: none !important; }
      .v2-round-enter { animation: none !important; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:bg-white focus:px-4 focus:py-2 focus:z-50 focus:rounded focus:shadow-lg" style="font-size: 14px;">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useMemo, useEffect } = React;

    // ─── Regions ──────────────────────────────────────────────────────────────

    const REGIONS = [
      { id: "rural", name: "Rural / Small Town", example: "Rural Midwest, Appalachia, Deep South", housingMult: 0.62, otherMult: 0.87 },
      { id: "south-metro", name: "Southern Metro", example: "Atlanta, Charlotte, Nashville, San Antonio", housingMult: 0.88, otherMult: 0.94 },
      { id: "midwest-metro", name: "Midwest Metro", example: "Chicago, Detroit, Minneapolis, Columbus", housingMult: 0.90, otherMult: 0.95 },
      { id: "national-avg", name: "National Average", example: "Baseline — no regional adjustment", housingMult: 1.00, otherMult: 1.00, isDefault: true },
      { id: "northeast-metro", name: "Northeast Metro", example: "Philadelphia, Hartford, Providence", housingMult: 1.30, otherMult: 1.04 },
      { id: "west-metro", name: "Western Metro", example: "Portland, Seattle, Denver, Sacramento", housingMult: 1.45, otherMult: 1.07 },
      { id: "high-cost", name: "High-Cost Metro", example: "NYC, SF Bay Area, Boston, DC, LA", housingMult: 1.70, otherMult: 1.14 },
    ];

    function adjustExpenses(expenses, region) {
      if (!region || region.id === "national-avg") return { ...expenses };
      const adjusted = {};
      for (const [key, val] of Object.entries(expenses)) {
        if (key === "housing") {
          adjusted[key] = Math.round(val * region.housingMult);
        } else {
          adjusted[key] = Math.round(val * region.otherMult);
        }
      }
      return adjusted;
    }

    // ─── Household Data ───────────────────────────────────────────────────────

    const HOUSEHOLDS = [
      {
        id: "single-mom",
        name: "Maria — Single Mother",
        description: "Single mom, 2 kids (ages 4 & 9). Works part-time as a home health aide.",
        monthlyIncome: 1680,
        members: 3,
        mixedStatus: false,
        baselineQuality: 50,
        baselineNote: "This family starts at 50% stability. Maria is working and her kids are in school, but she can't absorb a $1,000 emergency. The safety net is the only thing between managing and crisis.",

        annualCredits: { ctc: 2649, eitc: 7152, ctcNote: "CTC is $2,200/child but Maria owes $0 in taxes — so only the refundable Additional Child Tax Credit (ACTC) applies: 15% of earnings over $2,500, up to $1,700/child.", eitcNote: "Maximum EITC for a single filer with 2 qualifying children — her income is below the phaseout threshold. EITC is fully refundable." },
        expenses: { housing: 1150, food: 680, healthcare: 45, transportation: 280, childcare: 400, utilities: 190, clothing: 95, phone: 55, other: 100 },
        story: "Maria works 30 hours a week as a home health aide while her older child is in school. Without childcare assistance, she couldn't work at all. Every month is a balancing act — one car repair or sick day away from falling behind.",
      },
      {
        id: "elderly-couple",
        name: "James & Dorothy — Retired Couple",
        description: "Both 72. James has diabetes; Dorothy has early-stage Alzheimer's. Fixed income from Social Security.",
        incomeNote: "James receives $1,490/month from Social Security based on a career in warehouse and custodial work. Dorothy receives $850/month — she worked part-time for years before leaving the workforce to care for her mother. Their combined $2,340/month (2025 benefit levels) is below the national average for retired couples, but typical for low-income workers without pensions.",
        monthlyIncome: 2340,
        members: 2,
        mixedStatus: false,
        baselineQuality: 45,
        baselineNote: "This couple starts at 45% stability. They're managing diabetes, early-stage Alzheimer's, and rising medical costs on a fixed income. Without Medicare, Medicaid, and housing assistance, they could not stay in their home.",
        benefits: { snap: 351, medicare: 1640, medicaid: 480, housing: 410, liheap: 85, mealProgram: 120 },
        annualCredits: {},
        expenses: { housing: 980, food: 520, healthcare: 380, medications: 460, transportation: 150, utilities: 210, phone: 45, other: 80 },
        story: "James and Dorothy have lived in their apartment for 18 years. James spent his career in warehouse and custodial work; Dorothy worked part-time for years before leaving the workforce to care for her mother. Neither had access to a pension. James manages his diabetes with insulin and regular checkups. Dorothy's condition requires increasing support — they're trying to stay independent as long as possible.",
      },
      {
        id: "working-family",
        name: "The Johnsons — Working Family",
        description: "Two parents, 3 kids (ages 2, 7, 12). Dad works full-time warehouse; Mom works retail part-time.",
        baselineQuality: 52,
        baselineNote: "This family starts at 52% stability. Both parents are working and the kids are in school, but even with two incomes they can't absorb an unexpected expense. The safety net is the margin between stability and spiral.",
        monthlyIncome: 3200,
        members: 5,
        mixedStatus: false,
        benefits: { snap: 854, medicaid: 1800, schoolLunch: 195, wic: 75, housing: 380 },
        annualCredits: { ctc: 5790, eitc: 6376, ctcNote: "CTC is $2,200/child × 3 = $6,600 max. ~$690 offsets their federal tax; the rest comes back as the refundable ACTC, capped at $1,700/child.", eitcNote: "EITC for MFJ with 3+ children. Income is in the phaseout range, reducing the max $8,046 by ~$1,670." },
        expenses: { housing: 1400, food: 920, healthcare: 120, childcare: 580, transportation: 440, utilities: 260, clothing: 160, phone: 90, school: 85, other: 120 },
        story: "The Johnsons are doing everything right — both working, kids in school. But one unexpected expense can send them into a spiral. Their oldest needs braces; their youngest needs full-time childcare.",
      },
      {
        id: "mixed-status",
        name: "The Ramirez Family — Mixed-Status Family",
        description: "Two parents (ITINs, no SSNs), 3 US-citizen kids (ages 3, 8, 13). Dad: construction. Mom: house cleaning.",
        monthlyIncome: 3100,
        members: 5,
        mixedStatus: true,
        baselineQuality: 35,
        baselineNote: "This family starts at 35% stability. They are excluded from Medicaid (parents), TANF, housing assistance, and the EITC. Under the TCJA (2018\u20132025), they could claim the Child Tax Credit for their US-citizen children \u2014 about $5,820/year. H.R. 1 — popularly known as the One Big Beautiful Bill (OBBB), signed July 2025 — took that away by requiring the filer to have an SSN. Their remaining safety net is SNAP (pro-rated for eligible members only), children\u2019s Medicaid, school meals, and WIC. Even before any cuts begin, this family runs a monthly deficit \u2014 they are structurally vulnerable by design, and the OBBB made it worse.",
        benefits: { snap: 516, childMedicaid: 900, schoolLunch: 195, wic: 75 },
        annualCredits: { ctc: 0, eitc: 0, ctcNote: "Under the TCJA (2018\u20132025), ITIN-filing parents could claim the CTC for children with valid SSNs \u2014 about $5,820/year. The OBBB now requires the filer to have an SSN, locking this family out entirely. They lost an estimated ~$720 in nonrefundable CTC (based on estimated tax liability) plus ~$5,100 in refundable ACTC ($1,700/child).", eitcNote: "The EITC has always required the filer to have a valid SSN. ITIN filers are ineligible regardless of their children's status." },
        expenses: { housing: 1580, food: 880, healthcare: 390, childcare: 520, transportation: 400, utilities: 240, clothing: 140, phone: 70, remittances: 150, other: 110 },
        story: "Carlos and Elena have lived in the US for 14 years. They pay taxes with ITINs, contribute to Social Security they\u2019ll never collect, and their three children are American citizens. The parents have no access to Medicaid, TANF, or housing assistance \u2014 though their US-citizen children qualify for children\u2019s Medicaid on their own. Under the TCJA, they could claim the Child Tax Credit for their citizen children \u2014 about $5,820/year that helped cover school supplies, clothing, and bills. When the OBBB was signed in July 2025, that credit was taken away: the new law requires the filer to have an SSN, not just the children. They\u2019ve never been eligible for the EITC, which has always required the filer to have an SSN. As of 2026, they pay approximately $1,100 annually into a Medicare Trust Fund they are legally barred from ever using \u2014 part of the $6.4 billion undocumented immigrants contribute to Medicare each year.",
        statusNote: "This family files taxes with ITINs because the parents don\u2019t have SSNs. Their US-citizen children have SSNs. Under the TCJA (2018\u20132025), only the child needed an SSN for the CTC \u2014 so this family could claim it. The OBBB changed that: now the filer must also have an SSN. The EITC has always required the filer to have an SSN, so they\u2019ve never been eligible for that credit.",
      },
      {
        id: "middle-class",
        name: "The Carters — Self-Employed Family",
        description: "Sarah runs a small home health aide business. David does contract IT work. 2 kids (ages 10, 7). Younger child has autism and receives therapy through Medicaid.",
        monthlyIncome: 6250,
        members: 4,
        mixedStatus: false,
        baselineQuality: 58,
        baselineNote: "This family starts at 58% stability. They earn more than the other households, but they\u2019ve already absorbed the ACA premium cliff \u2014 a $600\u2013$1,100/month cost increase when enhanced tax credits expired (the exact amount depends on plan tier and region). That shock alone moved them from comfortable to stretched.",
        benefits: { childMedicaid: 1800 },
        lostSubsidy: 850,
        annualCredits: { ctc: 4400, eitc: 0, ctcNote: "Full $2,200/child credit applied against their ~$4,700\u2013$4,900 estimated tax liability (varies with self-employment deductions). Entirely nonrefundable \u2014 reduces taxes owed but no cash refund.", eitcNote: "Income of $75K exceeds the $64,430 MFJ limit for 2 children. This family earns too much to qualify for the EITC." },
        waiverNote: "Their son qualifies for Medicaid through a disability waiver (often called a Katie Beckett or TEFRA waiver), which evaluates only the child\u2019s income and disability status \u2014 not the family\u2019s household income. This is why the family qualifies despite earning $75,000/year. As states face tighter Medicaid budgets under the OBBB, administrative reviews of disability waivers are expected to increase, and families like the Carters may face re-evaluation of their son\u2019s \u2018medical necessity\u2019 determination.",
        expenses: { housing: 1850, food: 950, insurancePremiums: 850, healthcare: 450, childcare: 200, transportation: 580, utilities: 250, clothing: 140, phone: 95, therapyCopays: 150, other: 150 },
        story: "Sarah built a small home health aide business from scratch \u2014 she employs two other caregivers and serves elderly clients in their homes. David does contract IT work while being the primary caregiver for their 7-year-old, who has autism and needs speech therapy, occupational therapy, and behavioral support. As self-employed workers with no employer coverage, they depended on the ACA marketplace for health insurance. The enhanced premium tax credits made their plan affordable at ~$300/month. When those credits expired on December 31, 2025, their premiums jumped by $600\u2013$1,100/month (depending on plan tier and region) \u2014 a shock the family wasn\u2019t prepared for. Their son\u2019s Medicaid disability waiver \u2014 which evaluates only the child\u2019s income and disability, not the family\u2019s \u2014 covers therapy services worth $21,600/year that they could never afford out of pocket. As states face budget pressure from OBBB Medicaid cuts, administrative reviews of disability waivers are expected to increase.",
      },
    ];

    // ─── Policy Rounds ────────────────────────────────────────────────────────

    const POLICY_ROUNDS = [
      {
        id: "snap-cut", title: "SNAP Benefits Reduction (OBBB)", chartLabel: "SNAP", programKey: "snap",
        programInfo: "SNAP (Supplemental Nutrition Assistance Program), commonly known as food stamps, is the nation's largest anti-hunger program. It provides monthly funds on an EBT card that families use to buy groceries. Eligibility is based on income and household size. For many families, SNAP is the difference between eating and going hungry.",

        { id: "reduce-hours", label: "Cut work hours to gather documentation and attend appointments", severity: 2, detail: "Ironically, the time spent proving you work enough can force you to work less. Lost wages compound the financial pressure \u2014 and if hours drop below 80 in any month, you fail the review anyway. (In reality, reduced income could increase SNAP benefits, partially cushioning the loss \u2014 but this simulator does not model that dynamic adjustment.)" },
      ],
    };

    const BENEFIT_NAMES = {
      snap: "SNAP (Food Stamps)", medicaid: "Medicaid", medicare: "Medicare", tanf: "TANF (Cash Aid)",
      housing: "Housing Voucher", schoolLunch: "School Lunch Program", chip: "CHIP (Children\u2019s Health Insurance)",
      wic: "WIC", liheap: "LIHEAP (Energy Aid)", mealProgram: "Meals on Wheels",
      ctc: "Child Tax Credit", eitc: "Earned Income Tax Credit",
      childMedicaid: "Children\u2019s Medicaid",
    };

    // ─── Helpers ──────────────────────────────────────────────────────────────

    const SERVICE_COVERAGE_KEYS = ["childMedicaid", "medicaid", "medicare", "chip", "schoolLunch", "wic", "mealProgram"];
    function getBenefitTotal(b) { return Object.values(b).reduce((s, v) => s + v, 0); }
    function getCashBenefitTotal(b) { return Object.entries(b).filter(([k]) => !SERVICE_COVERAGE_KEYS.includes(k)).reduce((s, [, v]) => s + v, 0); }
    function getExpenseTotal(e) { return Object.values(e).reduce((s, v) => s + v, 0); }
    function formatMoney(n) { return "$" + Math.round(n).toLocaleString(); }

    // ─── Eligibility Engine ────────────────────────────────────────────────────

    function calculateFPL(members) {
      if (members <= 0) return 0;
      return 15650 + (members - 1) * 5500;
    }

    function calculateEligibility(income, adults, children, childrenAges, mixedStatus, adultsOver65, options) {
      const opts = options || {};
      const incomeSource = opts.incomeSource || "employment";
      const childcareCost = opts.childcareCost || 0;
      const housingCost = opts.housingCost || 0;
      const medicalCost = opts.medicalCost || 0;

      const members = adults + children;
      const annualIncome = income * 12;
      const baseFPL = calculateFPL(members);
      const schoolAgeChildren = (childrenAges || []).filter(a => a >= 5 && a <= 18).length;
      const underFiveChildren = (childrenAges || []).filter(a => a < 5).length;
      const isElderly = (adultsOver65 || 0) > 0;

      // SNAP: gross income ≤ 130% FPL, net income ≤ 100% FPL
      // Elderly/disabled HH exempt from gross income test
      const snapGrossLimit = baseFPL * 1.3 / 12;
      const snapPassesGross = isElderly || income <= snapGrossLimit;

      // FY2025 standard deduction by HH size
      const snapStdDed = members <= 3 ? 204 : members === 4 ? 217 : members === 5 ? 254 : 291;
      // 20% earned income deduction — only on earned income, not Social Security
      const earnedIncomeForSnap = incomeSource === "retirement" ? 0 : incomeSource === "mixed" ? income * 0.5 : income;
      const snapEarnedDed = Math.round(earnedIncomeForSnap * 0.2);
      // Dependent care deduction (actual childcare costs)
      const snapDepCareDed = childcareCost;
      // Medical expense deduction — elderly/disabled only, costs over $35/mo
      const snapMedicalDed = isElderly && medicalCost > 35 ? medicalCost - 35 : 0;
      // Adjusted income after standard, earned income, dep care, medical deductions
      const snapAdjIncome = Math.max(0, income - snapStdDed - snapEarnedDed - snapDepCareDed - snapMedicalDed);
      // Excess shelter deduction: shelter costs − 50% of adjusted income
      // Use SUA (national median ~$400) instead of actual utility costs
      const snapSUA = 400;
      const snapShelterCost = housingCost + snapSUA;
      const snapExcessShelter = Math.max(0, snapShelterCost - Math.round(snapAdjIncome * 0.5));
      // Cap at $712 for non-elderly/disabled; uncapped for elderly/disabled
      const snapShelterDed = isElderly ? snapExcessShelter : Math.min(snapExcessShelter, 712);
      // Net income
      const snapNetIncome = Math.max(0, snapAdjIncome - snapShelterDed);
      const snapNetLimit = baseFPL / 12;
      const snapEligible = snapPassesGross && snapNetIncome <= snapNetLimit;

      // SNAP max allotments FY2025 (monthly)
      const snapAllotments = { 1: 292, 2: 536, 3: 768, 4: 975, 5: 1158, 6: 1390, 7: 1536, 8: 1756 };
      const snapMax = snapAllotments[Math.min(members, 8)] || (1756 + (members - 8) * 220);
      let snapBenefit = snapEligible ? Math.max(0, snapMax - Math.round(snapNetIncome * 0.3)) : 0;
      // Pro-rata for mixed-status households per 7 CFR 273.11
      const snapEligibleMembers = mixedStatus ? children : members;
      if (mixedStatus && snapBenefit > 0 && members > 0) {
        snapBenefit = Math.round(snapBenefit * (snapEligibleMembers / members));
      }

      // Medicaid expansion: income ≤ 138% FPL
      const medicaidLimit = baseFPL * 1.38 / 12; // Monthly comparison
      const adultMedicaidEligible = !mixedStatus && income <= medicaidLimit;
      // Children's Medicaid: ≤ 138% FPL — US-citizen children qualify regardless of parent immigration status
      const childMedicaidEligible = children > 0 && income <= medicaidLimit;
      const medicaidAdultValue = adultMedicaidEligible ? adults * 450 : 0;
      const medicaidChildValue = childMedicaidEligible ? children * 300 : 0;
      const medicaidEligible = adultMedicaidEligible || childMedicaidEligible;
      const medicaidTotal = medicaidAdultValue + medicaidChildValue;

      // CHIP: children at 138–200% FPL — mutually exclusive with children's Medicaid
      const chipLimit = baseFPL * 2.0 / 12;
      const chipEligible = children > 0 && !childMedicaidEligible && income <= chipLimit;
      const chipBenefit = chipEligible ? children * 170 : 0;

      // TANF: income ≤ ~50% FPL (very restrictive)
      const tanfLimit = baseFPL * 0.5 / 12;
      const tanfEligible = !mixedStatus && income <= tanfLimit && children > 0;
      const tanfAllotments = { 2: 300, 3: 432, 4: 500, 5: 575, 6: 650, 7: 725, 8: 800 };
      const tanfBenefit = tanfEligible ? (tanfAllotments[Math.min(members, 8)] || 800) : 0;

      // Housing: income ≤ 50% AMI (proxy: ~$35,000/year for family of 4)
      const housingIncomeLimit = (35000 * (members / 4)) / 12;
      const housingEligible = !mixedStatus && income <= housingIncomeLimit;
      const housingAllotments = { 1: 410, 2: 410, 3: 620, 4: 750, 5: 750, 6: 850, 7: 950, 8: 1050 };
      const housingBenefit = housingEligible ? (housingAllotments[Math.min(members, 8)] || 1050) : 0;

      // WIC: income ≤ 185% FPL, requires child under 5
      const wicLimit = baseFPL * 1.85 / 12;
      const wicEligible = income <= wicLimit && underFiveChildren > 0;
      const wicBenefit = wicEligible ? 75 : 0;

      // School Lunch (free): income ≤ 130% FPL, requires school-age children
      const schoolLunchLimit = baseFPL * 1.3 / 12;
      const schoolLunchEligible = income <= schoolLunchLimit && schoolAgeChildren > 0;
      const schoolLunchBenefit = schoolLunchEligible ? schoolAgeChildren * 65 : 0;

      // LIHEAP: income ≤ 150% FPL
      const liheapLimit = baseFPL * 1.5 / 12;
      const liheapEligible = income <= liheapLimit;
      const liheapBenefit = liheapEligible ? 85 : 0;

      // Medicare: for adults 65+ (monthly value estimate)
      const medicareEligible = isElderly;
      const medicareBenefit = medicareEligible ? (adultsOver65 || 0) * 820 : 0;

      // Meals on Wheels (mealProgram): for elderly, income-eligible
      const mealProgramEligible = isElderly && income <= (baseFPL * 1.5 / 12);
      const mealProgramBenefit = mealProgramEligible ? 120 : 0;

      // EITC: requires earned income, phases out — ALL ANNUAL values (2025 per Rev. Proc. 2024-40)
      const eitcLimits = { 0: 19104, 1: 50434, 2: 57310, 3: 61555 };
      const mfjAdjs = { 0: 7110, 1: 7120, 2: 7120, 3: 7120 };
      const mfjAdj = adults > 1 ? (mfjAdjs[Math.min(children, 3)] || 7120) : 0;
      const eitcLimit = (eitcLimits[Math.min(children, 3)] || 61555) + mfjAdj;
      const eitcMaxes = { 0: 649, 1: 4328, 2: 7152, 3: 8046 };
      const eitcMaxForFamily = eitcMaxes[Math.min(children, 3)] || 8046;
      const eitcEligible = !mixedStatus && annualIncome > 0 && annualIncome <= eitcLimit;

      // EITC phase-in / plateau / phaseout calculation (2025 per Rev. Proc. 2024-40)
      let eitcBenefit = 0;
      if (eitcEligible) {
        const eitcPhaseInRate = { 0: 0.0765, 1: 0.34, 2: 0.40, 3: 0.45 };
        const eitcEarnedIncomeAmt = { 0: 8490, 1: 12730, 2: 17880, 3: 17880 };
        const eitcPhaseoutStart = { 0: 10620, 1: 23350, 2: 23350, 3: 23350 };
        const eitcPhaseoutRate = { 0: 0.0765, 1: 0.1598, 2: 0.2106, 3: 0.2106 };
        const childKey = Math.min(children, 3);
        const piRate = eitcPhaseInRate[childKey] || 0.45;
        const earnedAmt = eitcEarnedIncomeAmt[childKey] || 17880;
        const startPt = (eitcPhaseoutStart[childKey] || 23350) + mfjAdj;
        const rate = eitcPhaseoutRate[childKey] || 0.2106;
        // Phase-in: credit ramps up from $0 to max as income rises to earned income amount
        const phaseInCredit = Math.min(eitcMaxForFamily, Math.round(annualIncome * piRate));
        if (annualIncome <= startPt) {
          eitcBenefit = phaseInCredit;
        } else {
          eitcBenefit = Math.max(0, Math.round(eitcMaxForFamily - (annualIncome - startPt) * rate));
        }
      }

      // CTC: $2,200/child — ALL ANNUAL values
      // Phaseout: $50 reduction per $1,000 over $400,000 (MFJ) or $200,000 (single)
      const ctcPhaseoutThreshold = adults > 1 ? 400000 : 200000;
      const ctcPhaseoutReduction = Math.max(0, Math.ceil((annualIncome - ctcPhaseoutThreshold) / 1000) * 50);
      const ctcFullCredit = children * 2200;
      const ctcAfterPhaseout = Math.max(0, ctcFullCredit - ctcPhaseoutReduction);
      const ctcEligible = !mixedStatus && children > 0 && ctcAfterPhaseout > 0;
      // ACTC (refundable): 15% of (annual earned income - $2,500), capped at $1,700/child
      const actcRefund = ctcEligible ? Math.min(children * 1700, Math.max(0, (annualIncome - 2500) * 0.15)) : 0;
      // At high incomes, the credit is nonrefundable (offsets tax liability) — cap ACTC at phased-out amount
      const ctcAnnual = ctcEligible ? Math.min(Math.round(actcRefund), ctcAfterPhaseout) : 0;

      const result = {
        snap: { eligible: snapEligible, default: Math.round(snapBenefit), min: 0, max: snapMax, note: snapEligible ? "" : "Income exceeds SNAP limits for your household size" },
        medicaid: { eligible: medicaidEligible, default: medicaidEligible ? medicaidTotal : 0, min: 0, max: (adults + children) * 600, note: !medicaidEligible && mixedStatus ? "Mixed-status parents are ineligible for Medicaid" : !medicaidEligible ? "Income exceeds 138% FPL" : medicaidEligible && mixedStatus ? "US-citizen children qualify; parents are ineligible" : "" },
        chip: { eligible: chipEligible, default: Math.round(chipBenefit), min: 0, max: children * 340, note: chipEligible ? "" : children === 0 ? "No children in household" : childMedicaidEligible ? "Children covered through Medicaid" : "Income exceeds 200% FPL" },
        tanf: { eligible: tanfEligible, default: Math.round(tanfBenefit), min: 0, max: Math.round(tanfBenefit * 1.5), note: tanfEligible ? "" : mixedStatus ? "Mixed-status families are ineligible" : children === 0 ? "Requires children" : "Income exceeds ~50% FPL" },
        housing: { eligible: housingEligible, default: Math.round(housingBenefit), min: 0, max: Math.round(housingBenefit * 1.5), note: !housingEligible && mixedStatus ? "Mixed-status families are ineligible" : !housingEligible ? "Income exceeds 50% area median income" : "" },
        wic: { eligible: wicEligible, default: Math.round(wicBenefit), min: 0, max: 120, note: wicEligible ? "" : underFiveChildren === 0 ? "Requires child under 5" : "Income exceeds 185% FPL" },
        schoolLunch: { eligible: schoolLunchEligible, default: Math.round(schoolLunchBenefit), min: 0, max: schoolAgeChildren * 130, note: schoolLunchEligible ? "" : schoolAgeChildren === 0 ? "No school-age children (5–18)" : "Income exceeds 130% FPL" },
        liheap: { eligible: liheapEligible, default: Math.round(liheapBenefit), min: 0, max: 120, note: liheapEligible ? "" : "Income exceeds 150% FPL" },
      };

      // Add elderly-specific benefits only if relevant
      if (isElderly) {
        result.medicare = { eligible: medicareEligible, default: medicareBenefit, min: 0, max: (adultsOver65 || 0) * 1200, note: "" };
        result.mealProgram = { eligible: mealProgramEligible, default: mealProgramBenefit, min: 0, max: 180, note: mealProgramEligible ? "" : "Income exceeds 150% FPL" };
      }

      // Tax credits — stored as ANNUAL values
      result.eitc = { eligible: eitcEligible, default: eitcBenefit, min: 0, max: eitcMaxForFamily, note: eitcEligible ? "" : mixedStatus ? "ITIN filers are ineligible for EITC" : children === 0 ? "Childless EITC is very small; requires very low income" : annualIncome > eitcLimit ? "Annual income exceeds EITC limit (" + formatMoney(eitcLimit) + ")" : "Not eligible", isAnnual: true };
      result.ctc = { eligible: ctcEligible, default: ctcAnnual, min: 0, max: children * 1700, note: ctcEligible ? "" : mixedStatus ? "ITIN filers are ineligible under OBBB" : children === 0 ? "Requires children" : ctcAfterPhaseout <= 0 ? "Income exceeds CTC phaseout threshold (" + formatMoney(ctcPhaseoutThreshold) + ")" : "Requires children and SSN", isAnnual: true };

      return result;
    }

    function estimateExpenses(adults, children, hasChildcare) {
      const childrenUnderFive = hasChildcare ? Math.min(children, 2) : 0; // Cap at 2 for childcare calculation
      return {
        housing: Math.max(750, 1150 + (adults + children - 3) * 200),
        food: adults * 250 + children * 180,
        healthcare: 45 + (adults + children) * 20,
        transportation: 280 + Math.max(0, adults - 1) * 50,
        childcare: childrenUnderFive * 400,
        utilities: 150 + (adults + children) * 20,
        clothing: adults * 40 + children * 35,
        phone: 55,
        other: 100,
      };
    }

    function calculateBaselineQuality(income, cashBenefits, expenses, mixedStatus, isElderly, incomeSource) {
      const totalCash = income + cashBenefits;
      const expenseTotal = typeof expenses === 'number' ? expenses : getExpenseTotal(expenses);
      const ratio = expenseTotal > 0 ? totalCash / expenseTotal : 0;

      // Continuous scale with interpolation — score reflects real financial cushion
      let base;
      if (ratio >= 3.0) base = 95;
      else if (ratio >= 2.0) base = Math.round(85 + (ratio - 2.0) * 10);     // 85–95
      else if (ratio >= 1.5) base = Math.round(72 + (ratio - 1.5) * 26);     // 72–85
      else if (ratio >= 1.3) base = Math.round(63 + (ratio - 1.3) * 45);     // 63–72
      else if (ratio >= 1.15) base = Math.round(55 + (ratio - 1.15) * 53.3); // 55–63
      else if (ratio >= 1.0) base = Math.round(48 + (ratio - 1.0) * 46.7);   // 48–55
      else if (ratio >= 0.85) base = Math.round(38 + (ratio - 0.85) * 66.7); // 38–48
      else if (ratio >= 0.7) base = Math.round(30 + (ratio - 0.7) * 53.3);   // 30–38
      else base = Math.max(20, Math.round(20 + ratio * 14.3));                // 20–30

      if (mixedStatus) base = Math.max(20, base - 8);
      // Full elderly penalty for fixed income, smaller for mixed, none for employment
      if (isElderly) {
        const elderlyPenalty = incomeSource === "retirement" ? 3 : incomeSource === "mixed" ? 1 : 0;
        base = Math.max(20, base - elderlyPenalty);
      }
      return Math.min(97, base);
    }

    function generateCustomStory(config) {
      const { name, adults, children, income, mixedStatus, childrenAges, adultsOver65, incomeSource, hasDisabledChild } = config;
      const isElderly = (adultsOver65 || 0) > 0;
      const isFixedIncome = isElderly && incomeSource === "retirement";
      const isMixedIncome = isElderly && incomeSource === "mixed";
      const elderlySuffix = isElderly ? ` (${adultsOver65} age 65 or older)` : "";
      const isSingle = adults === 1;
      const isChildless = children === 0;

      // Build household description
      let story = "";
      if (isChildless) {
        if (isSingle) {
          story = `${name} is a single-adult household${elderlySuffix}. `;
        } else {
          story = `${name} is a household of ${adults} adults${elderlySuffix}. `;
        }
      } else {
        const childMsg = children === 1 ? "1 child" : `${children} children`;
        story = `${name} is a household of ${adults} adult${adults === 1 ? "" : "s"}${elderlySuffix} and ${childMsg}. `;
        const ages = (childrenAges || []).map(a => a === "under5" ? "under 5" : a === "5-12" ? "5-12" : "13-17");
        if (ages.length > 0) story += `The children are ages ${ages.join(", ")}. `;
        if (hasDisabledChild) story += `${children === 1 ? "The child has" : "At least one child has"} a disability and receives therapy and support services through Medicaid via a disability waiver. `;
      }

      // Add income/work context
      if (isFixedIncome) {
        if (isSingle) {
          story += `This individual is retired and lives on a fixed income of ${formatMoney(income)}/month from Social Security and/or pensions. `;
        } else {
          story += `They are retired and live on a combined fixed income of ${formatMoney(income)}/month from Social Security and/or pensions. `;
        }
      } else if (isMixedIncome) {
        if (isSingle) {
          story += `This individual has a mix of employment wages and retirement income totaling ${formatMoney(income)}/month. `;
        } else {
          story += `This household brings in ${formatMoney(income)}/month from a mix of employment wages and retirement income. `;
        }
      } else if (isElderly) {
        // Elderly but employment income
        if (isSingle) {
          story += `This individual earns ${formatMoney(income)}/month through employment. `;
        } else {
          story += `This household earns a combined ${formatMoney(income)}/month, with at least one working adult. `;
        }
      } else {
        if (isSingle && isChildless) {
          story += `This individual earns ${formatMoney(income)}/month. `;
          if (income < 3000) {
            story += `Every dollar is accounted for — rent, food, transportation, and healthcare leave almost nothing for emergencies. `;
          } else {
            story += `The budget is tight but manageable, with limited room for unexpected expenses. `;
          }
        } else if (isSingle) {
          story += `This single parent earns ${formatMoney(income)}/month while raising ${children === 1 ? "a child" : `${children} children`}. Every month is a balancing act. `;
        } else if (isChildless) {
          story += `They earn a combined ${formatMoney(income)}/month. `;
          if (income < 4000) {
            story += `With two adults on a tight budget, there is little margin for error. `;
          }
        } else {
          story += `They earn a combined ${formatMoney(income)}/month. Both are working and doing their best to provide for their family. `;
        }
      }

      // Build baseline note
      let baselineNote = "";
      if (isFixedIncome) {
        if (isChildless) {
          baselineNote = `This ${isSingle ? "individual lives" : "household lives"} on a fixed income. Social Security and benefits provide basic support, but rising healthcare costs and unexpected expenses create hardship quickly.`;
        } else {
          baselineNote = `This household manages on a fixed income while supporting ${children === 1 ? "a child" : "children"}. Benefits provide essential support, but the margin for emergencies is thin.`;
        }
      } else if (isMixedIncome) {
        if (isChildless) {
          baselineNote = `This ${isSingle ? "individual has" : "household has"} a mix of employment and retirement income. The working income provides some flexibility, but rising costs and the needs of aging members add vulnerability.`;
        } else {
          baselineNote = `This household balances employment wages and retirement income while supporting ${children === 1 ? "a child" : "children"}. The working income helps, but the needs of both younger and older members stretch the budget.`;
        }
      } else if (isElderly) {
        if (isChildless) {
          baselineNote = `Despite having ${isSingle ? "an" : "a"} working-age adult, this household includes ${adultsOver65 === 1 ? "a member" : "members"} over 65 with healthcare needs that add financial pressure.`;
        } else {
          baselineNote = `This household has employment income and includes ${adultsOver65 === 1 ? "an adult" : "adults"} over 65 while supporting ${children === 1 ? "a child" : "children"}. They're working, but the combination of childcare and aging-related costs makes the budget tight.`;
        }
      } else if (isChildless) {
        if (isSingle) {
          baselineNote = `This individual starts at a modest baseline stability level. Current income ${income < 2500 ? "barely covers" : "covers"} basic expenses, but there is little cushion for emergencies like a medical bill or car repair.`;
        } else {
          baselineNote = `This household starts at a modest baseline stability level. Combined income ${income < 4000 ? "barely covers" : "covers"} basic expenses, with limited room for unexpected costs.`;
        }
      } else {
        baselineNote = `This family starts at a modest baseline stability level. With current benefits and income, they can meet basic expenses but have little margin for emergencies.`;
      }

      // Build status note
      const statusNote = mixedStatus
        ? `${name} files taxes with ITINs because the ${isSingle ? "adult doesn't have" : "parents don't have"} SSNs.${children > 0 ? " Their US-citizen children have SSNs." : ""} This status affects eligibility for several federal programs and tax credits.`
        : undefined;

      // Build income note
      const incomeNote = isSingle
        ? `Monthly earned income: ${formatMoney(income)}`
        : `Combined monthly earned income: ${formatMoney(income)}`;

      return { story, baselineNote, incomeNote, statusNote };
    }

    function generateSimulationSummary({ household, region, finalBenefits, finalScore, allChoices, skippedRounds, rounds }) {
      const originalTotal = getBenefitTotal(household.benefits);
      const remainingTotal = getBenefitTotal(finalBenefits);
      const totalLost = originalTotal - remainingTotal;
      const percentLost = Math.round((totalLost / (originalTotal || 1)) * 100);
      const allTradeoffs = allChoices.flatMap((cs) => Object.entries(cs).map(([area, oid]) => {
        const opt = (TRADEOFF_OPTIONS[area] || []).find((o) => o.id === oid);
        return opt ? { area, ...opt } : null;
      }).filter(Boolean)).filter((t, i, arr) => arr.findIndex((x) => x.id === t.id) === i);

      const regionName = region && region.id !== "national-avg" ? region.name : "National Average";
      const cashBefore = getCashBenefitTotal(household.benefits);
      const cashAfter = getCashBenefitTotal(finalBenefits);
      const expenseTotal = getExpenseTotal(adjustExpenses(household.expenses, region));
      const surplusBefore = household.monthlyIncome + cashBefore - expenseTotal;
      const surplusAfter = household.monthlyIncome + cashAfter - expenseTotal;
      const credits = household.annualCredits || {};
      const creditTotal = (credits.ctc || 0) + (credits.eitc || 0);

      const benefitRows = Object.entries(household.benefits).filter(([,v]) => v > 0).map(([k, v]) => {
        const after = finalBenefits[k] || 0;
        const lost = v - after;
        return `<tr><td style="padding:6px 10px;border-bottom:1px solid #eee;">${BENEFIT_NAMES[k] || k}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;text-align:right;">${formatMoney(v)}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;text-align:right;">${formatMoney(after)}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;text-align:right;color:${lost > 0 ? '#DC2626' : '#059669'};">${lost > 0 ? '\u2212' + formatMoney(lost) : '\u2014'}</td></tr>`;
      }).join("");

      // Map each tradeoff area to the round that caused it
      const roundForArea = {};
      allChoices.forEach((cs, i) => {
        if (i < rounds.length) {
          Object.keys(cs).forEach(area => { roundForArea[area] = rounds[i].title; });
        }
      });

      const tradeoffRows = allTradeoffs.map(t => {
        const sevLabel = { 1: "Low", 2: "Medium", 3: "Severe" };
        const sevColor = { 1: "#CA8A04", 2: "#EA580C", 3: "#DC2626" };
        const roundName = roundForArea[t.area] || "";

    function Logo({ size = "normal" }) {
      const h = size === "small" ? "80px" : "100px";
      return (
        <div style={{ display: 'inline-block' }}>
          <img src={LOGO_SRC} alt="mBOLDen Change" style={{ height: h, width: 'auto' }} />
        </div>
      );
    }

    // ─── UI Components ────────────────────────────────────────────────────────

    function ProgressBar({ current, total }) {
      const getBarColor = (i) => {
        if (i > current) return "bg-gray-200";
        const pct = i / Math.max(total - 1, 1);
        if (i === current) return "bg-amber-400";
        if (pct < 0.33) return "bg-emerald-400";
        if (pct < 0.66) return "bg-amber-400";
        return "bg-red-500";
      };
      return (
        <div className="flex items-center gap-3 mb-6" role="progressbar" aria-valuenow={current + 1} aria-valuemin={1} aria-valuemax={total} aria-label={`Policy round ${current + 1} of ${total}`}>
          <span className="text-xs font-medium text-gray-400" style={{fontFamily: "'Archivo Narrow', sans-serif"}}>Round {current + 1} of {total}</span>
          <div className="flex items-center gap-1.5 flex-1">
            {Array.from({ length: total }).map((_, i) => (
              <div key={i} className={`h-2 flex-1 rounded-full transition-all duration-500 ${getBarColor(i)}`} />
            ))}
          </div>
        </div>
      );
    }

    function SeverityDots({ severity, size }) {
      const [showTip, setShowTip] = useState(false);
      const sevColors = { 1: "#FACC15", 2: "#FB923C", 3: "#EF4444" };
      const sevLabels = { 1: "Lower impact on stability", 2: "Moderate impact on stability", 3: "Severe impact on stability" };
      const dotSize = size === "lg" ? "w-3 h-3" : "w-2.5 h-2.5";
      return (
        <div className="relative flex mt-2" style={{cursor: 'pointer', width: 'fit-content'}}
          role="img" aria-label={`Severity: ${severity} of 3 — ${sevLabels[severity]}`}
          onClick={(e) => { e.stopPropagation(); setShowTip((p) => !p); }}
          onMouseEnter={() => setShowTip(true)} onMouseLeave={() => setShowTip(false)}>
          <div className="flex gap-0.5" aria-hidden="true">
            {Array.from({ length: 3 }).map((_, i) => <div key={i} className={`${dotSize} rounded-full`} style={{backgroundColor: i < severity ? sevColors[severity] : '#E5E7EB'}} />)}
          </div>
          {showTip && <div className="sev-tooltip">{sevLabels[severity]}</div>}
        </div>
      );
    }

    function QualityOfLifeMeter({ score, label, showDefinition }) {
      const color = score > 75 ? "bg-emerald-500" : score > 50 ? "bg-amber-400" : score > 25 ? "bg-orange-500" : "bg-red-600";
      const emoji = score > 75 ? "\u{1F60A}" : score > 50 ? "\u{1F61F}" : score > 25 ? "\u{1F630}" : "\u{1F622}";
      return (
        <div className="rounded-xl p-4" style={{background: 'var(--card-bg)', border: '1px solid var(--card-border)'}} role="status" aria-live="polite" aria-label={`Household stability: ${Math.round(score)}%`}>
          <div className="flex justify-between items-center mb-2">
            <span className="text-sm font-medium text-gray-600" style={{fontFamily: "'Archivo Narrow', sans-serif"}}>{label || "Household Stability"}</span>
            <span className="text-lg">{emoji}</span>
          </div>
          <div className="w-full bg-gray-100 rounded-full h-4 overflow-hidden">
            <div className={`h-full rounded-full transition-all duration-1000 ease-out ${color}`} style={{ width: `${Math.max(score, 2)}%` }} />
          </div>
          <div className="flex justify-between items-center mt-1">
            {showDefinition ? <span className="text-xs text-gray-400">This family's capacity to meet basic needs under current conditions</span> : <span />}
            <span className="text-xs font-mono text-gray-500">{Math.round(score)}%</span>
          </div>
        </div>
      );
    }

    function BudgetBar({ income, expenses, benefits }) {
      const gap = income + benefits - expenses;
      const isNeg = gap < 0;
      return (
        <div className="rounded-xl p-4" style={{background: 'var(--card-bg)', border: '1px solid var(--card-border)'}}>
          <div className="flex justify-between items-center mb-3">
            <span className="text-sm font-medium" style={{color: '#777'}}>Monthly Budget</span>
            <span className={`text-sm font-bold ${isNeg ? "text-red-600" : "text-emerald-600"}`}>{isNeg ? "Shortfall: " : "Surplus: "}{formatMoney(Math.abs(gap))}</span>
          </div>
          <div className="space-y-2">
            {[["Income", income, "bg-blue-400"], ["Support", benefits, "bg-emerald-400"], ["Expenses", expenses, "bg-red-400"]].map(([label, val, bg]) => (
              <div key={label} className="flex items-center gap-2">
                <span className="text-xs text-gray-500 w-16">{label}</span>
                <div className="flex-1 bg-gray-100 rounded-full h-3 overflow-hidden">
                  <div className={`h-full ${bg} rounded-full`} style={{ width: label === "Expenses" ? "100%" : `${(val / (expenses || 1)) * 100}%` }} />
                </div>
                <span className="text-xs font-mono w-16 text-right">{formatMoney(val)}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Screens ──────────────────────────────────────────────────────────────

    function IntroScreen({ onStart }) {
      return (
        <div className="v2-hero">
          <div className="v2-hero-logo"><Logo /></div>
          <div className="pre-header mb-4" style={{color: '#FAD826', opacity: 0, animation: 'v2FadeUp 1s ease 0.2s forwards'}}>A POLICY IMPACT SIMULATION</div>
          <h1 className="v2-hero-title">The Safety Net<br/><em>Simulator</em></h1>
          <p className="v2-hero-sub">An interactive experience about policy choices and real consequences</p>
          <div className="rounded-xl p-5 my-8 text-left" style={{backgroundColor: 'rgba(248,239,224,0.08)', borderLeft: '4px solid #FAD826', maxWidth: '560px'}}>
            <p className="text-sm leading-relaxed mb-3" style={{color: '#ccc'}}>
              <strong style={{color: '#fff'}}>How it works:</strong> You'll follow a household through a series of federal policy

            <p className="text-sm leading-relaxed" style={{color: '#999'}}><a href="https://www.mboldenchange.org" target="_blank" rel="noopener noreferrer" className="font-semibold underline" style={{ fontFamily: "'Archivo Narrow', 'Roboto', Arial, sans-serif", color: '#0091AD' }}>mBOLDen Change</a> champions, designs, and incubates bold, community-driven solutions that dismantle barriers and close equity gaps — so everyone has the resources and power to thrive. Since 2006, we have provided critical resources to hundreds of thousands of children and families. During this time, we've partnered with hundreds of organizations to distribute more than $2.5 million in direct economic assistance, deliver basic needs to over 250,000 individuals, and advocate tirelessly for policies that uplift children.</p>

    // ─── Household Builder Wizard ──────────────────────────────────────────────

    function HouseholdBuilder({ onComplete, onCancel }) {
      const [step, setStep] = useState(1);
      const [config, setConfig] = useState({
        name: "Your Household",
        adults: 1,
        children: 0,
        childrenAges: [],
        income: 2000,
        mixedStatus: false,
        adultsOver65: 0,
        incomeSource: "employment",
        hasDisabledChild: false,
        region: null,
        customExpenses: null,
      });

      const handleInputChange = (field, value) => {
        const newConfig = { ...config, [field]: value };
        if (field === "children") {
          newConfig.childrenAges = Array(value).fill("under5");
          if (value === 0) newConfig.hasDisabledChild = false;
        }
        // Reset custom expenses when household composition changes (they'll be recalculated)
        if (field === "adults" || field === "children" || field === "region") {
          newConfig.customExpenses = null;
        }
        // Cap adultsOver65 when adults decrease
        if (field === "adults" && (newConfig.adultsOver65 || 0) > value) {
          newConfig.adultsOver65 = value;
        }
        setConfig(newConfig);
      };

      const handleAgeChange = (index, age) => {
        const newAges = [...config.childrenAges];
        newAges[index] = age;
        setConfig({ ...config, childrenAges: newAges });
      };

      const rawExpenses = estimateExpenses(config.adults, config.children, config.children > 0);
      const preRegionExpenses = config.customExpenses || (config.region ? adjustExpenses(rawExpenses, config.region) : rawExpenses);
      const eligibility = calculateEligibility(
        config.income,
        config.adults,
        config.children,
        config.childrenAges.map(a => a === "under5" ? 3 : a === "5-12" ? 9 : 15),
        config.mixedStatus,
        config.adultsOver65 || 0,
        {
          incomeSource: config.incomeSource || "employment",
          childcareCost: preRegionExpenses.childcare || 0,
          housingCost: preRegionExpenses.housing || 0,
          medicalCost: (preRegionExpenses.healthcare || 0) + (preRegionExpenses.medications || 0),
        }
      );

      // Disability waiver: children with disabilities qualify for Medicaid regardless of family income
      // Models Katie Beckett / TEFRA waiver pathway — evaluates child's disability, not family income
      if (config.hasDisabledChild && config.children > 0) {
        const waiverValue = config.children * 600;
        if (!eligibility.medicaid.eligible || eligibility.medicaid.default === 0) {
          // No existing Medicaid — add childMedicaid via disability waiver
          eligibility.childMedicaid = { eligible: true, default: waiverValue, min: 0, max: waiverValue, note: "Qualifies through disability waiver (Katie Beckett/TEFRA) — evaluates child's disability, not family income" };
        }
      }

      const baseExpenses = preRegionExpenses;
      const cashBenefits = Object.entries(eligibility).reduce((sum, [key, val]) => {
        if (!SERVICE_COVERAGE_KEYS.includes(key) && !val.isAnnual && val.eligible) return sum + val.default;
        return sum;
      }, 0);
      const baselineQuality = calculateBaselineQuality(config.income, cashBenefits, baseExpenses, config.mixedStatus, (config.adultsOver65 || 0) > 0, config.incomeSource);

      const totalEligibleCount = Object.values(eligibility).filter(v => v.eligible && !v.isAnnual).length;
      const totalBenefitValue = Object.entries(eligibility).reduce((sum, [key, val]) => {
        if (val.eligible && !val.isAnnual) return sum + val.default;
        return sum;
      }, 0);
      const fplMonthly = calculateFPL(config.adults + config.children) / 12;
      const isHighIncome = config.income > fplMonthly * 4 && totalEligibleCount <= 2 && totalBenefitValue < 200;

      // High-income households get a very high stability score
      const highIncomeQuality = (() => {
        const expTotal = getExpenseTotal(baseExpenses);
        const ratio = expTotal > 0 ? config.income / expTotal : 2;
        if (ratio >= 5) return 97;
        if (ratio >= 3) return 95;
        if (ratio >= 2) return 92;
        if (ratio >= 1.5) return 88;
        if (ratio >= 1.3) return 78;
        if (ratio >= 1.15) return 68;
        return 58;
      })();

      const storyData = generateCustomStory({
        name: config.name,
        adults: config.adults,
        children: config.children,
        income: config.income,
        mixedStatus: config.mixedStatus,
        childrenAges: config.childrenAges,
        adultsOver65: config.adultsOver65,
        incomeSource: config.incomeSource,
        hasDisabledChild: config.hasDisabledChild,

      const finalBenefits = Object.entries(eligibility).reduce((acc, [key, val]) => {
        if (val.eligible && val.default > 0 && !val.isAnnual) acc[key] = val.default;
        return acc;
      }, {});

      const createHousehold = () => {
        const household = {

          expenses: baseExpenses,
          customRegion: config.region,

          incomeNote: storyData.incomeNote,
