                    <span className={`font-bold text-lg ${config.income + cashBenefits - getExpenseTotal(baseExpenses) >= 0 ? "text-emerald-600" : "text-red-600"}`}>
                      {config.income + cashBenefits - getExpenseTotal(baseExpenses) >= 0 ? "+" : "−"}
                      {formatMoney(Math.abs(config.income + cashBenefits - getExpenseTotal(baseExpenses)))}
                    </span>
                  </div>
                  <hr className="my-2" />
                  <div className="flex justify-between items-center">
                    <span className="text-gray-600">Starting stability:</span>
                    <div className="flex items-center gap-2">
                      <div className="w-24 bg-gray-200 rounded-full h-2">
                        <div
                          className={`h-full rounded-full ${
                            baselineQuality >= 58 ? "bg-green-500" : baselineQuality >= 45 ? "bg-yellow-500" : "bg-red-500"
                          }`}
                          style={{ width: `${baselineQuality}%` }}
                        />
                      </div>
                      <span className="font-bold">{baselineQuality}%</span>
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-900">
                <p><strong>Ready to start?</strong> Click below to enter the simulation with this household and see how policy cuts affect them.</p>
              </div>
            </div>
          ),
        },
      ];

      // Insert high-income awareness gate after Step 2 — this becomes the TERMINAL step
      const isAwarenessGateStep = isHighIncome && step === 3;
      if (isHighIncome) {
        // Replace remaining steps with just the awareness gate
        steps.splice(2, steps.length - 2, {
          title: "About this household",
          content: (
            <div className="space-y-6">
              <div className="rounded-xl p-6" style={{backgroundColor: '#F0FDF4', border: '2px solid #86EFAC'}}>
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-12 h-12 rounded-full flex items-center justify-center text-2xl" style={{backgroundColor: '#DCFCE7'}}>
                    {"\u2713"}
                  </div>
                  <div>
                    <h3 className="font-bold text-lg" style={{fontFamily: "'Archivo Narrow', sans-serif", color: '#166534'}}>This household is financially stable</h3>
                    <p className="text-sm text-green-700">Estimated stability: <strong>{highIncomeQuality}%</strong></p>
                  </div>
                </div>
                <div className="w-full bg-green-200 rounded-full h-3 mb-4">
                  <div className="h-full rounded-full bg-green-500" style={{ width: `${highIncomeQuality}%` }} />
                </div>
                <p className="text-sm text-gray-700 leading-relaxed mb-3">
                  {totalEligibleCount === 0
                    ? <>Based on your household's income of <strong>{formatMoney(config.income)}/month</strong> ({formatMoney(config.income * 12)}/year), this family doesn't qualify for any safety net programs. These programs are designed for families who need them — and at this income level, the safety net simply doesn't apply.</>
                    : <>Based on your household's income of <strong>{formatMoney(config.income)}/month</strong> ({formatMoney(config.income * 12)}/year), this family qualifies for very little from the safety net. That's the system working as intended — these programs target families who need them most.</>
                  }
                </p>
                <p className="text-sm text-gray-700 leading-relaxed mb-3">
                  Go back and adjust the income to explore how families at different income levels are affected by these policy changes.
                </p>
                <div className="bg-white rounded-lg p-4 border border-green-200">
                  <p className="text-xs text-gray-600 leading-relaxed">
                    <strong>Why this matters:</strong> The safety net isn't designed for this income level. Families earning {formatMoney(config.income * 12)}/year don't depend on SNAP, Medicaid, or housing vouchers — so cuts to those programs won't affect them. But millions of working families do depend on these programs to bridge the gap between their wages and the cost of living. Try adjusting the income to see the real impact.
                  </p>
                </div>
              </div>
            </div>
          ),
        });
      }

      const currentStep = steps[step - 1];
      const isLastStep = step === steps.length;

      return (
        <div className="max-w-2xl mx-auto py-6">
          <div className="mb-6">
            <div className="flex items-center gap-2 mb-3">
              {Array.from({length: steps.length}, (_, i) => i + 1).map((s) => (
                <div key={s} className="flex items-center gap-2">
                  <div
                    className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all ${
                      s <= step ? "bg-teal-600 text-white" : "bg-gray-200 text-gray-600"
                    }`}
                  >
                    {s}
                  </div>
                  {s < steps.length && <div className={`w-6 h-0.5 ${s < step ? "bg-teal-600" : "bg-gray-200"}`} />}
                </div>
              ))}
            </div>
            <h2 className="text-2xl font-bold" style={{fontFamily: "'Archivo Narrow', sans-serif"}}>
              {currentStep.title}
              {step === 1 && <span className="ml-2 px-2 py-0.5 text-xs font-medium rounded-full align-middle" style={{backgroundColor: '#FEF3C7', color: '#92400E', fontSize: '0.65rem', letterSpacing: '0.05em'}}>BETA</span>}
            </h2>
          </div>

          <div className="rounded-xl p-6 mb-6" style={{background: 'var(--card-bg)', border: '1px solid var(--card-border)'}}>
            {currentStep.content}
          </div>

          <div className="flex gap-3">
            {step > 1 && (
              <button
                onClick={() => setStep(step - 1)}
                className="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition-all"
              >
                ← Back
              </button>
            )}
            {step === 1 && (
              <button
                onClick={onCancel}
                className="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition-all"
              >
                Cancel
              </button>
            )}
            <div className="flex-1" />
            {!isLastStep && (
              <button
                onClick={() => setStep(step + 1)}
                className="px-6 py-2 rounded-lg font-medium text-white transition-all hover:opacity-90"
                style={{backgroundColor: '#0091AD'}}
              >
                Next →
              </button>
            )}
            {isLastStep && !isAwarenessGateStep && (
              <button
                onClick={createHousehold}
                className="px-8 py-2 rounded-lg font-medium text-white transition-all hover:opacity-90"
                style={{backgroundColor: '#0091AD'}}
              >
                Start Simulation →
              </button>
            )}
            {isAwarenessGateStep && (
              <button
                onClick={onCancel}
                className="px-8 py-2 rounded-lg font-medium text-white transition-all hover:opacity-90"
                style={{backgroundColor: '#0091AD'}}
              >
                Build a Different Household
              </button>
            )}
          </div>
        </div>
      );
    }

    const HOUSEHOLD_ACCENTS = { "single-mom": "#0091AD", "elderly-couple": "#0091AD", "working-family": "#0091AD", "mixed-status": "#B22F93", "middle-class": "#0091AD" };

    function HouseholdSelect({ onSelect, showBuilder }) {
      const [building, setBuilding] = useState(false);

      if (building) {
        return <HouseholdBuilder onComplete={onSelect} onCancel={() => setBuilding(false)} />;
      }

      return (
        <div className="max-w-5xl mx-auto py-6">
          <div className="pre-header mb-2" style={{color: '#0091AD'}}>SELECT A HOUSEHOLD</div>
          <h2 className="text-2xl font-bold mb-2" style={{fontFamily: "'Archivo Narrow', sans-serif"}}>Choose a household</h2>
          <p className="text-gray-500 mb-6">Each household depends on different programs. Your experience will vary.</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {HOUSEHOLDS.map((hh) => {
              const bt = getCashBenefitTotal(hh.benefits);
              const et = getExpenseTotal(hh.expenses);
              const accent = HOUSEHOLD_ACCENTS[hh.id] || "#0091AD";
              return (
                <button key={hh.id} onClick={() => onSelect(hh)} className="w-full text-left rounded-xl p-5 border-2 transition-all group flex flex-col" style={{borderLeftWidth: '4px', borderLeftColor: accent, background: 'var(--card-bg)', borderColor: 'var(--card-border)'}}>
                  <div className="flex-1">
                    <h3 className="font-bold text-lg group-hover:text-black" style={{fontFamily: "'Archivo Narrow', sans-serif", color: '#000'}}>{hh.name}</h3>
                    <p className="text-sm text-gray-600 mt-1">{hh.description}</p>
                    {hh.mixedStatus && <span className="inline-block mt-2 px-2 py-0.5 rounded text-xs font-medium" style={{backgroundColor: '#F3E8F9', color: '#B22F93'}}>Mixed immigration status — ITIN filers</span>}
                  </div>
                  <div className="flex gap-2 mt-3 text-xs flex-wrap">
                    <span className="bg-blue-50 text-blue-700 px-2 py-1 rounded-md">Income: {formatMoney(hh.monthlyIncome)}/mo</span>
                    <span className="bg-emerald-50 text-emerald-700 px-2 py-1 rounded-md">Support: {formatMoney(bt)}/mo</span>
                    <span className="bg-red-50 text-red-700 px-2 py-1 rounded-md">Expenses: {formatMoney(et)}/mo</span>
                    <span className="px-2 py-1 rounded-md text-xs" style={{backgroundColor: '#F8EFE0', color: '#666'}}>Stability: {hh.baselineQuality}%</span>
                  </div>
                </button>
              );
            })}
            {showBuilder && (
              <button
                onClick={() => setBuilding(true)}
                className="w-full text-left rounded-xl p-5 border-2 border-dashed transition-all group flex flex-col"
                style={{borderColor: 'var(--card-border)', background: 'var(--card-bg)'}}
                style={{borderLeftWidth: '4px', borderLeftColor: 'transparent'}}
              >
                <div className="flex-1">
                  <h3 className="font-bold text-lg group-hover:text-black" style={{fontFamily: "'Archivo Narrow', sans-serif", color: '#0091AD'}}>
                    Build Your Own Household
                    <span className="ml-2 px-2 py-0.5 text-xs font-medium rounded-full align-middle" style={{backgroundColor: '#FEF3C7', color: '#92400E', fontSize: '0.65rem', letterSpacing: '0.05em'}}>BETA</span>
                  </h3>
                  <p className="text-sm text-gray-600 mt-1">Customize income, family size, and immigration status to explore how the safety net works for different families.</p>
                </div>
              </button>
            )}
          </div>
        </div>
      );
    }

    function RegionSelect({ household, onSelect }) {
      return (
        <div className="max-w-3xl mx-auto py-6">
          <h2 className="text-2xl font-bold mb-2" style={{fontFamily: "'Archivo Narrow', sans-serif"}}>Where does this family live?</h2>
          <p className="text-gray-500 mb-1">Cost of living changes the math. Housing is the biggest variable.</p>
          <p className="text-xs text-gray-400 mb-6">Multipliers based on 2023 BEA Regional Price Parities and FY2025 HUD Fair Market Rent data.</p>
          <div className="space-y-3">
            {REGIONS.map((r) => {
              const adj = adjustExpenses(household.expenses, r);
              const adjTotal = getExpenseTotal(adj);
              const baseTotal = getExpenseTotal(household.expenses);
              const diff = adjTotal - baseTotal;
              return (
                <button key={r.id} onClick={() => onSelect(r)} className="w-full text-left rounded-xl p-4 border-2 transition-all group" style={{background: 'var(--card-bg)', borderColor: 'var(--card-border)'}}>
                  <div className="flex items-center justify-between">
                    <div>
                      <h3 className="font-bold text-gray-900 group-hover:text-black">
                        {r.name}
                        {r.isDefault && <span className="ml-2 text-xs font-normal text-gray-400">(default)</span>}
                      </h3>
                      <p className="text-xs text-gray-500 mt-0.5">{r.example}</p>
                    </div>
                    <div className="text-right">
                      <div className="text-sm font-mono">
                        {diff === 0 ? (
                          <span className="text-gray-400">baseline</span>
                        ) : diff > 0 ? (
                          <span className="text-red-600">+{formatMoney(diff)}/mo</span>
                        ) : (
                          <span className="text-emerald-600">{formatMoney(diff)}/mo</span>
                        )}
                      </div>
                      <div className="text-xs text-gray-400">
                        Housing: {Math.round(r.housingMult * 100)}% | Other: {Math.round(r.otherMult * 100)}%
                      </div>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function HouseholdIntro({ household, adjustedExpenses, region, onContinue }) {
      const benefitTotal = getCashBenefitTotal(household.benefits);
      const expenseTotal = getExpenseTotal(adjustedExpenses);
      const surplus = household.monthlyIncome + benefitTotal - expenseTotal;

      return (
        <div className="max-w-4xl mx-auto py-6">
          <div className="text-center mb-6">
            <h2 className="text-2xl font-bold" style={{fontFamily: "'Archivo Narrow', sans-serif"}}>{household.name}</h2>
            {household.mixedStatus && <span className="inline-block mt-2 bg-purple-50 text-purple-700 px-3 py-1 rounded-lg text-sm font-medium">Mixed immigration status household</span>}
            {region && region.id !== "national-avg" && (
              <p className="text-xs text-gray-400 mt-2">Expenses adjusted for: {region.name}</p>
            )}
          </div>
          <div className="rounded-xl p-5 mb-6" style={{backgroundColor: '#F8EFE0', borderLeft: '4px solid #FAD826'}}>
            <p className="text-gray-700 leading-relaxed italic brand-quote" style={{fontSize: '0.95rem'}}>"{household.story}"</p>
          </div>

          {household.statusNote && (
            <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 mb-6">
              <div className="flex items-start gap-2">
                <span className="text-sm mt-0.5">{"\u{1F4CB}"}</span>
                <div>
                  <h4 className="text-sm font-semibold text-purple-900 mb-1">Immigration & Tax Filing Status</h4>
                  <p className="text-sm text-purple-800 leading-relaxed">{household.statusNote}</p>
                </div>
              </div>
            </div>
          )}

          {household.baselineNote && (
            <div className="rounded-xl p-4 mb-6" style={{backgroundColor: '#FFFBEB', border: '1px solid #FAD826', borderLeft: '4px solid #FAD826'}}>
              <div className="flex items-start gap-2">
                <span className="text-sm mt-0.5">{"\u26A0\uFE0F"}</span>
                <div>
                  <h4 className="text-sm font-semibold mb-1" style={{color: '#92400E', fontFamily: "'Archivo Narrow', sans-serif"}}>Household Stability: {household.baselineQuality}%</h4>
                  <p className="text-sm leading-relaxed" style={{color: '#78350F'}}>{household.baselineNote}</p>
                  <div className="flex gap-4 mt-3 text-xs" style={{color: '#92400E'}}>
                    <span>75%+ = cushion to absorb shocks</span>
                    <span>50% = managing, but one emergency from crisis</span>
                    <span>25% = basic needs at risk</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {(() => {
            const cashBenefits = Object.entries(household.benefits).filter(([k, v]) => v > 0 && !SERVICE_COVERAGE_KEYS.includes(k));
            const coverageBenefits = Object.entries(household.benefits).filter(([k, v]) => v > 0 && SERVICE_COVERAGE_KEYS.includes(k));
            const cashTotal = cashBenefits.reduce((s, [, v]) => s + v, 0);
            const [detailOpen, setDetailOpen] = useState(false);
            return (
              <div className="mb-6">
                <button onClick={() => setDetailOpen(!detailOpen)} className="w-full flex items-center justify-between bg-white rounded-xl p-4 border border-gray-200 hover:border-gray-300 transition-colors text-left" aria-expanded={detailOpen} aria-label="Toggle benefits and expenses breakdown">
                  <div className="flex items-center gap-4 text-sm">
                    <span className="text-emerald-600 font-semibold">Support: {formatMoney(cashTotal)}/mo</span>
                    <span className="text-gray-300">|</span>
                    <span className="text-red-500 font-semibold">Expenses: {formatMoney(expenseTotal)}/mo</span>
                  </div>
                  <span className="text-gray-400 text-lg">{detailOpen ? "\u25B2" : "\u25BC"}</span>
                </button>
                {detailOpen && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3">
                    <div className="bg-white rounded-xl p-4 border border-gray-100">
                      {cashBenefits.length > 0 && (
                        <>
                          <h4 className="text-sm font-semibold text-gray-500 mb-3">Basic Needs Support (Monthly)</h4>
                          {cashBenefits.map(([key, val]) => (
                            <div key={key} className="flex justify-between text-sm py-1">
                              <span className="text-gray-600">{BENEFIT_NAMES[key] || key}</span>
                              <span className="font-mono text-emerald-600">{formatMoney(val)}</span>
                            </div>
                          ))}
                          <div className="border-t border-gray-100 mt-2 pt-2 flex justify-between font-bold text-sm">
                            <span>Total Cash Support</span>
                            <span className="text-emerald-600">{formatMoney(cashTotal)}</span>
                          </div>
                          <div className="flex justify-between text-xs pt-1">
                            <span className="text-gray-400">Annualized</span>
                            <span className="font-mono text-gray-400">{formatMoney(cashTotal * 12)}/year</span>
                          </div>
                        </>
                      )}
                      {coverageBenefits.length > 0 && (
                        <div className={cashBenefits.length > 0 ? "mt-4 pt-3 border-t border-gray-100" : ""}>
                          <h4 className="text-sm font-semibold text-gray-500 mb-2">In-Kind Support</h4>
                          <p className="text-xs text-gray-400 mb-2">Services & vouchers — not cash income</p>
                          {coverageBenefits.map(([key, val]) => (
                            <div key={key} className="flex justify-between text-sm py-1">
                              <span className="text-gray-600">{BENEFIT_NAMES[key] || key}</span>
                              <span className="font-mono text-blue-500">~{formatMoney(val)}/mo value</span>
                            </div>
                          ))}
                        </div>
                      )}
                      {cashBenefits.length === 0 && coverageBenefits.length > 0 && (
                        <div className="mt-2 pt-2 border-t border-gray-100">
                          <p className="text-xs text-gray-400 italic">No direct cash benefits — income comes from work only</p>
                        </div>
                      )}
                    </div>
                    <div className="bg-white rounded-xl p-4 border border-gray-100">
                      <h4 className="text-sm font-semibold text-gray-500 mb-3">Monthly Expenses</h4>
                      {Object.entries(adjustedExpenses).map(([key, val]) => {
                        const EXPENSE_NAMES = { therapyCopays: "Therapy Co-pays", childcare: "Childcare", remittances: "Family Remittances", insurancePremiums: "ACA Insurance Premiums" };
                        return (
                        <div key={key} className="flex justify-between text-sm py-1">
                          <span className="text-gray-600 capitalize">{EXPENSE_NAMES[key] || key}</span>
                          <span className="font-mono text-red-500">{formatMoney(val)}</span>
                        </div>
                        );
                      })}
                      <div className="border-t border-gray-100 mt-2 pt-2 flex justify-between font-bold text-sm">
                        <span>Total Expenses</span>
                        <span className="text-red-500">{formatMoney(expenseTotal)}</span>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

          {(household.lostSubsidy || 0) > 0 && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6">
              <div className="flex items-start gap-2">
                <span className="text-sm mt-0.5">{"\u26A0\uFE0F"}</span>
                <div>
                  <h4 className="text-sm font-semibold text-amber-900 mb-1">Lost: ACA Premium Tax Credit</h4>
                  <p className="text-sm text-amber-800 leading-relaxed">This family previously received ~{formatMoney(household.lostSubsidy)}/month in enhanced premium tax credits that made marketplace health insurance affordable. These credits expired December 31, 2025 and were not renewed in the OBBB. Their premiums have jumped accordingly.</p>
                </div>
              </div>
            </div>
          )}

          {household.annualCredits && (() => {
            const credits = household.annualCredits;
            const isIneligible = credits.ineligible;
            const ctc = credits.ctc || 0;
            const eitc = credits.eitc || 0;
            const total = ctc + eitc;
            if (!isIneligible && total === 0 && !credits.ctcNote && !credits.eitcNote) return null;
            return (
              <div className="bg-white rounded-xl p-4 border border-gray-100 mb-6">
                <h4 className="text-sm font-semibold text-gray-500 mb-1">Annual Tax Credits (2025 Tax Year)</h4>
                <p className="text-xs text-gray-400 mb-3">Estimated refund received at tax time — not monthly income. Amounts depend on income, filing status, and tax liability.</p>
                {isIneligible ? (
                  <div className="bg-red-50 rounded-lg p-3">
                    <div className="flex justify-between text-sm py-1"><span className="text-gray-600">Child Tax Credit / ACTC</span><span className="font-mono text-red-400">$0</span></div>
                    <div className="flex justify-between text-sm py-1"><span className="text-gray-600">Earned Income Tax Credit</span><span className="font-mono text-red-400">$0</span></div>
                    <p className="text-xs text-red-600 mt-2 font-medium">Ineligible — filers must have SSNs valid for employment. This family files with ITINs.</p>
                  </div>
                ) : (
                  <div>
                    {(ctc > 0 || credits.ctcNote) && (
                      <div className="py-1">
                        <div className="flex justify-between text-sm"><span className="text-gray-600">Child Tax Credit / ACTC</span><span className={`font-mono ${ctc > 0 ? "text-emerald-600" : "text-red-400"}`}>{ctc > 0 ? `~${formatMoney(ctc)}/year` : "$0"}</span></div>
                        {credits.ctcNote && <p className="text-xs text-gray-400 mt-0.5">{credits.ctcNote}</p>}
                      </div>
                    )}
                    {eitc > 0 ? (
                      <div className="py-1">
                        <div className="flex justify-between text-sm"><span className="text-gray-600">Earned Income Tax Credit</span><span className="font-mono text-emerald-600">~{formatMoney(eitc)}/year</span></div>
                        {credits.eitcNote && <p className="text-xs text-gray-400 mt-0.5">{credits.eitcNote}</p>}
                      </div>
                    ) : credits.eitcNote ? (
                      <div className="py-1">
                        <div className="flex justify-between text-sm"><span className="text-gray-600">Earned Income Tax Credit</span><span className="font-mono text-gray-400">$0</span></div>
                        <p className="text-xs text-gray-400 mt-0.5">{credits.eitcNote}</p>
                      </div>
                    ) : null}
                    <div className="border-t border-gray-100 mt-2 pt-2 flex justify-between font-bold text-sm">
                      <span>{total > 0 ? (eitc > 0 ? "Est. Total Annual Tax Benefit" : "Est. Annual Tax Reduction") : "Total Tax Credits"}</span><span className={total > 0 ? "text-emerald-600" : "text-red-500"}>{total > 0 ? `~${formatMoney(total)}/year` : "$0 — locked out by OBBB"}</span>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

          <BudgetBar income={household.monthlyIncome} expenses={expenseTotal} benefits={benefitTotal} />
          <div className="mt-4 bg-blue-50 rounded-xl p-4 text-center">
            <p className="text-sm text-blue-800">
              {surplus >= 0
                ? `This household barely breaks even, with just ${formatMoney(surplus)} left over each month. There is no margin for error.`
                : `This household is already ${formatMoney(Math.abs(surplus))} short each month — even with benefits.`}
            </p>
          </div>
          <div className="text-center mt-6">
            <button onClick={onContinue} className="text-white px-8 py-3 rounded-xl font-medium hover:opacity-90 transition-colors" style={{backgroundColor: '#0091AD'}}>Begin policy rounds {"\u2192"}</button>
          </div>
        </div>
      );
    }

    const GLOSSARY = {
      "SNAP": "Supplemental Nutrition Assistance Program (food stamps)",
      "TANF": "Temporary Assistance for Needy Families (cash aid)",
      "WIC": "Women, Infants, and Children nutrition program",
      "CHIP": "Children\u2019s Health Insurance Program",
      "LIHEAP": "Low Income Home Energy Assistance Program",
      "EITC": "Earned Income Tax Credit (refundable tax credit for low-income workers)",
      "CTC": "Child Tax Credit ($2,200/child for 2025)",
      "ACTC": "Additional Child Tax Credit (refundable portion of the CTC)",
      "ACA": "Affordable Care Act (Obamacare)",
      "ITIN": "Individual Taxpayer Identification Number (used by people without SSNs to file taxes)",
      "SSN": "Social Security Number",
      "MFJ": "Married Filing Jointly (tax filing status)",
      "FPL": "Federal Poverty Level",
      "OBBB": "One Big Beautiful Bill Act (H.R. 1, signed July 4, 2025) \u2014 federal budget reconciliation law with major changes to SNAP, Medicaid, tax credits, and other programs",
      "CBO": "Congressional Budget Office",
      "OAA": "Older Americans Act",
      "EBT": "Electronic Benefits Transfer (card used for SNAP benefits)",
    };
    function glossarize(text) {
      if (!text) return null;
      const pattern = new RegExp(`\\b(${Object.keys(GLOSSARY).join("|")})\\b`, "g");
      const seen = new Set();
      const parts = [];
      let last = 0;
      let match;
      while ((match = pattern.exec(text)) !== null) {
        if (seen.has(match[1])) continue;
        seen.add(match[1]);
        if (match.index > last) parts.push(text.slice(last, match.index));
        parts.push(React.createElement("abbr", { key: match.index, title: GLOSSARY[match[1]], className: "abbr-tooltip" }, match[1]));
        last = match.index + match[1].length;
      }
      if (last < text.length) parts.push(text.slice(last));
      return parts.length > 0 ? parts : text;
    }

    function ProgramInfoBox({ info }) {
      const [open, setOpen] = useState(false);
      if (!info) return null;
      return (
        <div className="mb-6">
          <button onClick={() => setOpen(!open)} className="flex items-center gap-2 text-sm font-semibold transition-colors" style={{color: '#0091AD'}}>

            <span className="underline">{open ? "Hide program details" : "What is this program?"}</span>

          {open && (
            <div className="mt-2 rounded-lg p-4" style={{backgroundColor: '#F8EFE0', borderLeft: '3px solid #0091AD'}}>
              <p className="text-sm text-gray-700 leading-relaxed">{glossarize(info)}</p>
            </div>
          )}
        </div>
      );
    }

    function PolicyRound({ round, household, currentBenefits, onChoice, onContinue, onGoBack }) {
      const [selectedChoices, setSelectedChoices] = useState({});
      const effectiveCutPercent = useMemo(() => getEffectiveCutPercent(round, household), [round, household]);
      const hasPerKeyCut = !!round.perKeyCut;
      const isAffected = hasPerKeyCut || effectiveCutPercent > 0;

      // Check if any selected tradeoff overrides the cut percent
      const overrideCutPercent = useMemo(() => {
        for (const [area, oid] of Object.entries(selectedChoices)) {
          const opt = (TRADEOFF_OPTIONS[area] || []).find((o) => o.id === oid);
          if (opt && opt.overrideCut !== undefined) return opt.overrideCut;
        }
        return null;
      }, [selectedChoices]);
      const finalCutPercent = overrideCutPercent !== null ? overrideCutPercent : effectiveCutPercent;

      const lostAmount = useMemo(() => {
        const keys = Array.isArray(round.programKey) ? round.programKey : [round.programKey];
        if (hasPerKeyCut && overrideCutPercent === null) {

            const pct = round.perKeyCut[key] || 0;
            return sum + Math.round((currentBenefits[key] || 0) * (pct / 100));
          }, 0);
        }
        return keys.reduce((sum, key) => sum + Math.round((currentBenefits[key] || 0) * (finalCutPercent / 100)), 0);

              <div className="mt-3"><span className={`text-xs ${ex ? "text-red-600" : "text-blue-600"}`}>{round.context}</span></div>

            <div className={`${ex ? "bg-purple-50 border-purple-200" : "bg-emerald-50 border-emerald-200"} border rounded-xl p-5 mb-6`}>

                  {aw.secondaryMessage && <p className={`text-sm ${ex ? "text-purple-700" : "text-emerald-700"} leading-relaxed mt-3 italic`}>{aw.secondaryMessage}</p>}
                </div>
              </div>
            </div>
            {hasTradeoff && (
              <div className="mb-6">
                {aw.tradeoffHeading && <h3 className="font-bold text-gray-900 mb-2">{aw.tradeoffHeading}</h3>}
                {aw.tradeoffSubtext && <p className="text-sm text-gray-500 mb-4">{aw.tradeoffSubtext}</p>}
                {tradeoffAreas.map((area) => {
                  const areaLabels = { food: "Food & Nutrition", healthcare: "Healthcare", housing: "Housing", insurance: "Health Insurance", cashAssistance: "Cash & Basic Needs", utilities: "Utilities", childcare: "Childcare", transportation: "Transportation", medications: "Medications", workRequirement: "Work Requirements", taxCreditLoss: "Coping with Lost Tax Credits", schoolFood: "School Meals & Child Nutrition" };

            <div className="flex items-center justify-center gap-4 mt-6">

            <div className="border-l-4 border-blue-400 rounded-r-xl p-5 mb-6" style={{backgroundColor: '#EFF6FF'}}>
              <h2 className="text-xl font-bold text-blue-900 mb-2" style={{fontFamily: "'Archivo Narrow', sans-serif"}}>{round.title}</h2>
              <p className="text-blue-800 text-sm leading-relaxed">{round.description}</p>

            </div>
            <ProgramInfoBox info={round.programInfo} />
            <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-5 mb-6">

                <span className="text-2xl">{"\u{1F6E1}\uFE0F"}</span>

                  <h3 className="font-bold text-emerald-900 mb-2">Your household is not directly affected</h3>

                </div>
              </div>
            </div>
            <div className="flex items-center justify-center gap-4 mt-6">
              {onGoBack && <button onClick={onGoBack} className="px-5 py-3 rounded-xl font-medium text-sm transition-colors border-2 hover:opacity-80" style={{color: '#0091AD', borderColor: '#0091AD'}}>{"\u2190"} Previous round</button>}

      // Affected

            <div className="mt-3 flex items-center gap-3 flex-wrap">
              <span className={`px-3 py-1 rounded-lg text-sm font-bold transition-all ${finalCutPercent === 100 ? "bg-red-200 text-red-800" : "bg-red-100 text-red-700"}`} title={`This ${finalCutPercent}% models the combined effect of multiple provisions. Individual household impacts will vary.`}>{"\u2212"}{formatMoney(lostAmount)}/month</span>
              {finalCutPercent === 100 && <span className="bg-red-200 text-red-800 px-3 py-1 rounded-lg text-sm font-bold animate-pulse">TOTAL LOSS</span>}

          </div>
          <ProgramInfoBox info={round.programInfo} />
          <div className="mb-6">
            <h3 className="font-bold text-gray-900 mb-1">What does this family sacrifice?</h3>
            <p className="text-sm text-gray-500 mb-4">Choose one tradeoff in each area. There are no good options.</p>
          </div>
          <div className="space-y-6">
            {relevantAreas.map((area) => (
              <div key={area}>
                <h4 className="font-semibold text-gray-700 capitalize mb-1 text-sm tracking-wide">{({ healthcare: "Healthcare", workRequirement: "Work Verification", medications: "Medications", insurance: "Insurance", cashAssistance: "Losing Cash Assistance", utilities: "Utilities", taxCreditLoss: "Coping with Lost Tax Credits", schoolFood: "School Meals & Child Nutrition" })[area] || area.charAt(0).toUpperCase() + area.slice(1)}</h4>
                {round.areaSubtitles && round.areaSubtitles[area] && <p className="text-xs text-gray-400 mb-2 italic">{round.areaSubtitles[area]}</p>}

                      </button>

              className={`px-8 py-3 rounded-xl font-medium transition-colors ${allSelected ? "text-white hover:opacity-90" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
              style={allSelected ? {backgroundColor: '#0091AD'} : {}}>
              Confirm tradeoffs & next round {"\u2192"}
            </button>
          </div>
        </div>
      );
    }

    function QolChart({ history }) {
      if (!history || history.length < 2) return null;
      const W = 600, H = 210, PAD = { t: 20, r: 20, b: 70, l: 45 };
      const cw = W - PAD.l - PAD.r, ch = H - PAD.t - PAD.b;
      const pts = history.map((h, i) => ({
        x: PAD.l + (i / (history.length - 1)) * cw,
        y: PAD.t + (1 - h.score / 100) * ch,
        score: h.score, label: h.label,
      }));
      const pathD = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
      const areaD = pathD + ` L${pts[pts.length - 1].x},${PAD.t + ch} L${pts[0].x},${PAD.t + ch} Z`;
      return (
        <div className="rounded-xl p-4 mb-6" style={{background: 'var(--card-bg)', border: '1px solid var(--card-border)'}}>
          <div className="pre-header mb-1" style={{color: '#0091AD'}}>HOUSEHOLD STABILITY TRAJECTORY</div>
          <p className="text-xs text-gray-400 mb-3">Each point represents a new round of cuts to safety net programs</p>
          <div className="qol-chart-wrap">
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{maxHeight: '230px'}} role="img" aria-label="Household stability trajectory chart showing score changes across policy rounds">
            <defs>
              <linearGradient id="qolGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#0091AD" stopOpacity="0.2" />
                <stop offset="100%" stopColor="#0091AD" stopOpacity="0.02" />
              </linearGradient>
            </defs>
            {[0, 25, 50, 75, 100].map((v) => {
              const y = PAD.t + (1 - v / 100) * ch;
              return <g key={v}><line x1={PAD.l} y1={y} x2={W - PAD.r} y2={y} stroke="#E5E7EB" strokeWidth="1" /><text x={PAD.l - 8} y={y + 4} textAnchor="end" fontSize="10" fill="#9CA3AF">{v}%</text></g>;
            })}
            <path d={areaD} fill="url(#qolGrad)" />
            <path d={pathD} fill="none" stroke="#0091AD" strokeWidth="2.5" strokeLinejoin="round" />
            {pts.map((p, i) => (
              <g key={i}>
                <circle cx={p.x} cy={p.y} r={i === 0 ? 5 : i === pts.length - 1 ? 6 : 4} fill={i === pts.length - 1 ? (p.score > 50 ? '#0091AD' : p.score > 25 ? '#FB923C' : '#EF4444') : '#0091AD'} stroke="white" strokeWidth="2" />
                <text x={i === 0 ? p.x + 14 : p.x} y={i === 0 ? p.y - 2 : p.y - 10} textAnchor={i === 0 ? "start" : "middle"} fontSize="10" fontWeight="bold" fill={i === pts.length - 1 ? '#000' : '#666'}>{Math.round(p.score)}%</text>
                <text x={p.x} y={PAD.t + ch + 14} textAnchor="middle" fontSize="8" fill="#9CA3AF">{i === 0 ? "Start" : `Round ${i}`}</text>
                {p.label && p.label !== "Start" && <text x={p.x} y={PAD.t + ch + 24} textAnchor="middle" fontSize="7" fill="#B0B0B0">{p.label.length > 12 ? p.label.slice(0, 11) + "\u2026" : p.label}</text>}
              </g>
            ))}
          </svg>
          </div>
        </div>
      );
    }

    function ResultsScreen({ household, region, finalBenefits, finalScore, allChoices, skippedRounds, rounds, qolHistory, onRestart }) {

      const allTradeoffs = allChoices.flatMap((cs) => Object.entries(cs).map(([area, oid]) => {

          {/* Results header — full-bleed black */}

                  <p className="text-xs" style={{color: '#999'}}>What this family lost</p>
                </div>
                <div className="v2-receipt-line">
                  <span style={{color: '#777'}}>Support lost / month</span>
                  <span style={{color: '#EF4444', fontWeight: 700, fontFamily: "'Archivo Narrow', sans-serif", fontSize: '18px'}}>{formatMoney(totalLost)}</span>
                </div>
                <div className="v2-receipt-line">
                  <span style={{color: '#777'}}>Safety net cut</span>
                  <span style={{color: '#92400E', fontWeight: 700, fontFamily: "'Archivo Narrow', sans-serif", fontSize: '18px'}}>{percentLost}%</span>
                </div>

                  <span style={{color: '#777'}}>Household stability</span>
                  <span style={{color: finalScore > 50 ? '#0091AD' : finalScore > 25 ? '#FB923C' : '#EF4444', fontWeight: 700, fontFamily: "'Archivo Narrow', sans-serif", fontSize: '18px'}}>{Math.round(finalScore)}%</span>

          {allTradeoffs.length > 0 && (
            <div>

                  <div><p className="text-sm font-medium text-gray-900">{t.label}</p><p className="text-xs text-gray-500 mt-0.5">{t.detail}</p></div>

                    <p className="text-sm font-medium" style={{color: '#134E4A'}}>{r.title}</p>

                  </div>
                ) : null;
              })}</div>
            </div>

          </div>

          {household.mixedStatus && (() => {
            const familyName = household.isCustom ? "This family" : "The Ramirez family";
            const numKids = household.isCustom ? (household.children || 0) : 3;
            const ctcLost = "$" + (household.isCustom ? (numKids * 2200) : (household.annualCredits?.ctc || 5820)).toLocaleString();

    // ─── Main App ─────────────────────────────────────────────────────────────

    function App() {
      const [screen, setScreen] = useState("intro");
      const [household, setHousehold] = useState(null);
      const [region, setRegion] = useState(null);
      const [adjustedExpenses, setAdjustedExpenses] = useState({});
      const [currentRound, setCurrentRound] = useState(0);
      const [currentBenefits, setCurrentBenefits] = useState({});
      const [qualityScore, setQualityScore] = useState(100);
      const [allChoices, setAllChoices] = useState([]);
      const [skippedRounds, setSkippedRounds] = useState([]);
      const [qolHistory, setQolHistory] = useState([]);
      const [roundSnapshots, setRoundSnapshots] = useState([]);
      const [hasCompletedSim, setHasCompletedSim] = useState(false);

      useEffect(() => { setTimeout(() => { window.scrollTo(0, 0); }, 50); }, [screen, currentRound]);

      const restart = useCallback(() => {
        setScreen("select"); setHousehold(null); setRegion(null); setAdjustedExpenses({});
        setCurrentRound(0); setCurrentBenefits({}); setQualityScore(100); setAllChoices([]); setSkippedRounds([]); setQolHistory([]); setRoundSnapshots([]);
      }, []);

      const selectHousehold = useCallback((hh) => {
        setHousehold(hh);
        if (hh.isCustom) {
          // Custom households have region-adjusted expenses already baked in
          const region = hh.customRegion || REGIONS.find(r => r.id === "national-avg");
          setRegion(region);
          setAdjustedExpenses({ ...hh.expenses });
          setCurrentBenefits({ ...hh.benefits });
          const bq = hh.baselineQuality || 100;
          setQualityScore(bq);
          setAllChoices([]);
          setSkippedRounds([]);
          setQolHistory([{ label: "Start", score: bq }]);
          setCurrentRound(0);
          setScreen("householdIntro");
        } else {
          setScreen("regionSelect");
        }
      }, []);

      const rounds = useMemo(() => {
        if (!household) return POLICY_ROUNDS;
        return POLICY_ROUNDS.filter((r) => !r.appliesTo || r.appliesTo(household));
      }, [household]);

      const selectRegion = useCallback((r) => {
        setRegion(r);
        const adj = adjustExpenses(household.expenses, r);
        setAdjustedExpenses(adj);
        setCurrentBenefits({ ...household.benefits });
        const bq = household.baselineQuality || 100;
        setQualityScore(bq); setAllChoices([]); setSkippedRounds([]); setQolHistory([{ label: "Start", score: bq }]); setCurrentRound(0);
        setScreen("householdIntro");
      }, [household]);

      const handleRoundChoice = useCallback((choices, lostAmount, effectiveCut, awarenessQualityPenalty = 0) => {
        setRoundSnapshots((prev) => [...prev, { benefits: { ...currentBenefits }, quality: qualityScore, choices: [...allChoices], skipped: [...skippedRounds], history: [...qolHistory] }]);
        const round = rounds[currentRound];
        const keys = Array.isArray(round.programKey) ? round.programKey : [round.programKey];
        if (effectiveCut === 0 && !round.perKeyCut) {
          const wasAffected = awarenessQualityPenalty > 0 || Object.keys(choices).length > 0;
          if (!wasAffected) setSkippedRounds((p) => [...p, round.id]);
          setAllChoices((p) => [...p, choices]);
          if (awarenessQualityPenalty > 0) setQualityScore((p) => Math.max(0, p - awarenessQualityPenalty));
          const tradeoffPenalty = Object.entries(choices).reduce((s, [a, oid]) => {
            const opt = (TRADEOFF_OPTIONS[a] || []).find((o) => o.id === oid);
            return s + (opt ? opt.severity * 4 : 0);
          }, 0);
          if (tradeoffPenalty > 0) setQualityScore((p) => Math.max(0, p - tradeoffPenalty));
          return;
        }
        setCurrentBenefits((prev) => {
          const next = { ...prev };
          if (round.perKeyCut) {
            keys.forEach((k) => { const pct = round.perKeyCut[k] || 0; if (next[k] !== undefined) next[k] = Math.max(0, Math.round(next[k] * (1 - pct / 100))); });
          } else {
            keys.forEach((k) => { if (next[k] !== undefined) next[k] = Math.max(0, Math.round(next[k] * (1 - effectiveCut / 100))); });
          }
          return next;
        });
        const penalty = Object.entries(choices).reduce((s, [a, oid]) => {
          const opt = (TRADEOFF_OPTIONS[a] || []).find((o) => o.id === oid);
          return s + (opt ? opt.severity * 4 : 0);
        }, 0);
        setQualityScore((p) => Math.max(0, p - penalty));
        setAllChoices((p) => [...p, choices]);
      }, [currentRound, rounds, currentBenefits, qualityScore, allChoices, skippedRounds, qolHistory]);

      const advanceRound = useCallback(() => {
        setQolHistory((h) => [...h, { label: rounds[currentRound]?.chartLabel || rounds[currentRound]?.title?.split(" ")[0] || `R${currentRound + 1}`, score: qualityScore }]);
        if (currentRound + 1 >= rounds.length) { setScreen("results"); setHasCompletedSim(true); }
        else setCurrentRound((r) => r + 1);
      }, [currentRound, rounds, qualityScore]);

      const goBackRound = useCallback(() => {
        if (currentRound === 0 || roundSnapshots.length === 0) return;
        const snap = roundSnapshots[roundSnapshots.length - 1];
        setCurrentBenefits(snap.benefits);
        setQualityScore(snap.quality);
        setAllChoices(snap.choices);
        setSkippedRounds(snap.skipped);
        setQolHistory(snap.history);
        setRoundSnapshots((p) => p.slice(0, -1));
        setCurrentRound((r) => r - 1);
      }, [currentRound, roundSnapshots]);

      const expenseTotal = household ? getExpenseTotal(adjustedExpenses) : 0;
      const benefitTotal = household ? getCashBenefitTotal(currentBenefits) : 0;

      // Sticky bar color logic
      const stickyBarColor = qualityScore > 50 ? '#0091AD' : qualityScore > 25 ? '#FB923C' : '#EF4444';
      const showStickyBar = screen === "round" && household;

      return (
        <React.Fragment>
          {/* V2: Sticky stability bar */}
          <div className={`v2-sticky-bar ${showStickyBar ? 'visible' : ''}`}>

            </span>
          </div>

          <main id="main-content" role="main" className="min-h-screen" style={{backgroundColor: screen === 'intro' ? '#000' : '#F8EFE0'}}>
            {screen !== "intro" && (
              <div className="max-w-5xl mx-auto px-4 pt-6">
                <div className="flex items-center justify-between mb-6">
                  <Logo size="small" />
                  <button onClick={restart} aria-label="Start over with a new household" className="text-sm font-medium hover:opacity-70 transition-colors flex items-center gap-1" style={{color: '#0091AD'}}>
                    {"\u21BB"} Start over
                  </button>
                </div>
              </div>
            )}
            {screen === "round" && household && (
              <div className="max-w-5xl mx-auto px-4 mb-4">
                <ProgressBar current={currentRound} total={rounds.length} />
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <QualityOfLifeMeter score={qualityScore} />
                  <BudgetBar income={household.monthlyIncome} expenses={expenseTotal} benefits={benefitTotal} />
                </div>
              </div>
            )}
            {screen === "intro" && <IntroScreen onStart={() => setScreen("select")} />}
            {screen === "select" && (
              <div className="v2-section v2-section-cream">
                <div className="v2-section-inner-wide">
                  <HouseholdSelect onSelect={selectHousehold} showBuilder={hasCompletedSim} />
                </div>
              </div>
            )}
            {screen === "regionSelect" && household && (
              <div className="v2-section v2-section-white">
                <div className="v2-section-inner">
                  <RegionSelect household={household} onSelect={selectRegion} />
                </div>
              </div>
            )}
            {screen === "householdIntro" && household && (
              <div className="v2-section v2-section-cream">
                <div className="v2-section-inner-wide">
                  <HouseholdIntro household={household} adjustedExpenses={adjustedExpenses} region={region} onContinue={() => setScreen("round")} />
                </div>
              </div>
            )}
            {screen === "round" && household && currentRound < rounds.length && (
              <div className={`v2-section ${currentRound % 2 === 0 ? 'v2-section-cream' : 'v2-section-white'}`}>
                <div className="v2-section-inner v2-round-enter" key={currentRound}>
                  <PolicyRound key={currentRound} round={rounds[currentRound]} household={household} currentBenefits={currentBenefits} onChoice={handleRoundChoice} onContinue={advanceRound} onGoBack={currentRound > 0 ? goBackRound : null} />
                </div>
              </div>
            )}
            {screen === "results" && household && (
              <ResultsScreen household={household} region={region} finalBenefits={currentBenefits} finalScore={qualityScore} allChoices={allChoices} skippedRounds={skippedRounds} rounds={rounds} qolHistory={qolHistory} onRestart={restart} />
            )}
          </main>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
